  // ---- Wirtschaft: Speichern / Laden / Einkommen -------------
  function incomePerSec() { let inc = 0; for (const k in BUILDINGS) inc += (state.economy[k] ? state.economy[k].level : 0) * BUILDINGS[k].incomePer; return inc; }
  function incomeTick() { const inc = incomePerSec(); if (inc > 0) { state.gold += inc; updateGold(); } save(); }
  function updateGold() { if (goldText) goldText.setText('💰 ' + state.gold); }

  // Werte aus Upgrades (Basis + Level-Bonus)
  function dmgPerBullet() { return BULLET_DMG + state.upgrades.damage * 6; }
  function fireMs() { return Math.max(80, FIRE_MS - state.upgrades.firerate * 22); }
  function moveSpeed() { return PLAYER_SPEED + state.upgrades.speed * 30; }
  function regenRate() { return REGEN_RATE + state.upgrades.regen * 4; }
  function magnetDist() { return MAGNET_DIST + state.upgrades.magnet * 45; }
  function applyUpgrades() { state.maxHp = PLAYER_MAX_HP + state.upgrades.hp * 25; if (state.hp > state.maxHp) state.hp = state.maxHp; updateLife(); }
  function save() {
    try {
      const ex = {}; for (const k in state.explored) ex[k] = [...state.explored[k]];
      localStorage.setItem(SAVE_KEY, JSON.stringify({ gold: state.gold, economy: state.economy, kills, inv: state.inventory, revealed: state.isRevealed, upgrades: state.upgrades, quests: state.quests, questBase: state.questBase, discovered: [...state.discovered], explored: ex, t: Date.now() }));
    } catch (e) { }
  }
  function load() {
    try {
      const raw = localStorage.getItem(SAVE_KEY); if (!raw) return;
      const s = JSON.parse(raw);
      state.gold = s.gold || 0; kills = s.kills || 0; state.inventory = s.inv || {}; state.isRevealed = !!s.revealed;
      state.upgrades = Object.assign({ damage: 0, firerate: 0, hp: 0, speed: 0, regen: 0, magnet: 0 }, s.upgrades || {});
      state.quests = s.quests || {}; state.questBase = s.questBase || {};
      state.discovered = new Set(s.discovered || []);
      state.explored = {}; for (const k in (s.explored || {})) state.explored[k] = new Set(s.explored[k]);
      state.economy = { saloon: { level: 0 }, forge: { level: 0 }, distillery: { level: 0 } };
      if (s.economy) { for (const k in BUILDINGS) if (s.economy[k]) state.economy[k].level = s.economy[k].level || 0; }
      else if (s.saloon) state.economy.saloon.level = 1;   // Migration alter Spielstände
      const inc = incomePerSec();
      if (inc > 0 && s.t) {
        const sec = Math.min(Math.floor((Date.now() - s.t) / 1000), OFFLINE_CAP), g = sec * inc;
        if (g > 0) { state.gold += g; pendingOffline = g; }
      }
    } catch (e) { }
  }

  // ---- Palisade (Stockade) -----------------------------------
  function placePost(x, y) {
    const post = sceneRef.add.rectangle(x, y - 11, 8, 22, POST_COL).setStrokeStyle(1, POST_DARK).setDepth(2);
    const tip = sceneRef.add.triangle(x, y - 22, -4, 0, 0, -7, 4, 0, POST_DARK).setDepth(2);
    mapObjects.push(post, tip);
  }
  function buildWallEdges(corners, gapWorld, gapR) {
    const spacing = 22;
    for (let e = 0; e < corners.length; e++) {
      const a = corners[e], b = corners[(e + 1) % corners.length];
      const n = Math.max(1, Math.round(Phaser.Math.Distance.Between(a.x, a.y, b.x, b.y) / spacing));
      let prev = null;
      for (let i = 0; i <= n; i++) {
        const x = a.x + (b.x - a.x) * i / n, y = a.y + (b.y - a.y) * i / n;
        if (gapWorld && Phaser.Math.Distance.Between(x, y, gapWorld.x, gapWorld.y) < gapR) { prev = null; continue; }  // Tor-Öffnung frei lassen
        if (i < n) placePost(x, y);
        if (prev) colliders.push({ type: 'seg', ax: prev.x, ay: prev.y, bx: x, by: y });   // solide Wand
        prev = { x, y };
      }
    }
  }
  function buildCityWall(m) {
    const c = [tileToWorld(0, 0), tileToWorld(m.cols - 1, 0), tileToWorld(m.cols - 1, m.rows - 1), tileToWorld(0, m.rows - 1)];
    const gate = m.portals[0] ? tileToWorld(m.portals[0].tx, m.portals[0].ty) : null;
    buildWallEdges(c, gate, 66);
  }
  function buildCompound(p) {
    const b = p.compound;
    const c = [tileToWorld(b.c0, b.r0), tileToWorld(b.c1, b.r0), tileToWorld(b.c1, b.r1), tileToWorld(b.c0, b.r1)];
    buildWallEdges(c, tileToWorld(p.tx, p.ty), 56);
  }

  // Backt einen Kachelbereich [c0,c1)x[r0,r1) in eine Textur und gibt ein platziertes Image zurück
  function bakeTileRange(m, c0, c1, r0, r1) {
    const pts = [tileToWorld(c0, r0), tileToWorld(c1 - 1, r0), tileToWorld(c0, r1 - 1), tileToWorld(c1 - 1, r1 - 1)];
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const p of pts) { minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x); minY = Math.min(minY, p.y); maxY = Math.max(maxY, p.y); }
    minX -= HALF_W; maxX += HALF_W; minY -= HALF_H; maxY += HALF_H;
    const offX = -minX, offY = -minY, texW = Math.max(1, Math.ceil(maxX - minX)), texH = Math.max(1, Math.ceil(maxY - minY));
    const fg = sceneRef.make.graphics({ add: false });
    for (let c = c0; c < c1; c++) for (let r = r0; r < r1; r++) {
      const cx = (c - r) * HALF_W + offX, cy = (c + r) * HALF_H + offY;
      fg.fillStyle((c + r) % 2 === 0 ? m.floorA : m.floorB, 1);
      fg.beginPath(); fg.moveTo(cx, cy - HALF_H); fg.lineTo(cx + HALF_W, cy); fg.lineTo(cx, cy + HALF_H); fg.lineTo(cx - HALF_W, cy); fg.closePath(); fg.fillPath();
      fg.lineStyle(1, m.grid, 0.4); fg.strokePath();
    }
    const key = 'floor_' + (floorTexN++);
    fg.generateTexture(key, texW, texH); fg.destroy();
    const img = sceneRef.add.image(minX, minY, key).setOrigin(0, 0).setDepth(0); img._key = key;
    return img;
  }
  function bakeFloor(m) { const img = bakeTileRange(m, 0, m.cols, 0, m.rows); floorKey = img._key; mapObjects.push(img); }

  // ---- Boden-Streaming (Chunks) ------------------------------
  function clearChunks() {
    for (const k in chunks) { const img = chunks[k]; if (img._key && sceneRef.textures.exists(img._key)) sceneRef.textures.remove(img._key); img.destroy(); }
    chunks = {};
  }
  // Baekt hoechstens `budget` fehlende Chunks pro Aufruf (naechste zuerst) -> kein Frame-Ruckeln
  function streamChunks(budget) {
    const m = MAPS[state.map]; if (!m.streamed) return;
    const ccx = Math.floor(state.playerTile.c / CHUNK), ccy = Math.floor(state.playerTile.r / CHUNK);
    const need = {}, missing = [];
    for (let dx = -CHUNK_RADIUS; dx <= CHUNK_RADIUS; dx++) for (let dy = -CHUNK_RADIUS; dy <= CHUNK_RADIUS; dy++) {
      const cx = ccx + dx, cy = ccy + dy;
      if (cx < 0 || cy < 0 || cx * CHUNK >= m.cols || cy * CHUNK >= m.rows) continue;
      const k = cx + '_' + cy; need[k] = 1;
      if (!chunks[k]) missing.push({ k, cx, cy, d: dx * dx + dy * dy });
    }
    for (const k in chunks) { if (!need[k]) { const img = chunks[k]; if (img._key && sceneRef.textures.exists(img._key)) sceneRef.textures.remove(img._key); img.destroy(); delete chunks[k]; } }
    if (missing.length) {
      missing.sort((a, b) => a.d - b.d);   // naeheste fehlende zuerst (Vorausschau)
      for (let i = 0, n = Math.min(budget, missing.length); i < n; i++) {
        const mm = missing[i];
        chunks[mm.k] = bakeTileRange(m, mm.cx * CHUNK, Math.min(m.cols, (mm.cx + 1) * CHUNK), mm.cy * CHUNK, Math.min(m.rows, (mm.cy + 1) * CHUNK));
      }
    }
  }

  // ---- Kollision (Wände & Gebäude) ---------------------------
  function closestPointOnSeg(px, py, ax, ay, bx, by) {
    const dx = bx - ax, dy = by - ay, l2 = dx * dx + dy * dy;
    let t = l2 > 0 ? ((px - ax) * dx + (py - ay) * dy) / l2 : 0; t = Phaser.Math.Clamp(t, 0, 1);
    return { x: ax + t * dx, y: ay + t * dy };
  }
  function resolveCollision() {
    for (const co of colliders) {
      if (co.type === 'seg') {
        const p = closestPointOnSeg(player.x, player.y, co.ax, co.ay, co.bx, co.by);
        let dx = player.x - p.x, dy = player.y - p.y, d = Math.hypot(dx, dy);
        if (d < PLAYER_R) { if (d < 0.001) { dx = 0; dy = -1; d = 1; } const push = PLAYER_R - d; player.x += dx / d * push; player.y += dy / d * push; }
      } else {
        const nx = Phaser.Math.Clamp(player.x, co.x, co.x + co.w), ny = Phaser.Math.Clamp(player.y, co.y, co.y + co.h);
        let dx = player.x - nx, dy = player.y - ny, d = Math.hypot(dx, dy);
        if (d < PLAYER_R) {
          if (d < 0.001) {
            const toL = player.x - co.x, toR = co.x + co.w - player.x, toT = player.y - co.y, toB = co.y + co.h - player.y, mn = Math.min(toL, toR, toT, toB);
            if (mn === toL) player.x = co.x - PLAYER_R; else if (mn === toR) player.x = co.x + co.w + PLAYER_R; else if (mn === toT) player.y = co.y - PLAYER_R; else player.y = co.y + co.h + PLAYER_R;
          } else { const push = PLAYER_R - d; player.x += dx / d * push; player.y += dy / d * push; }
        }
      }
    }
  }
  function scatterEnemies(m) {
    const count = Math.min(ENEMY_MAX, Math.round(m.cols * m.rows / ENEMY_PER_TILES));
    for (let i = 0; i < count; i++) {
      const c = Phaser.Math.Between(1, m.cols - 2), r = Phaser.Math.Between(1, m.rows - 2), w = tileToWorld(c, r);
      if (Phaser.Math.Distance.Between(w.x, w.y, player.x, player.y) < 220) continue;   // Startbereich frei halten
      addEnemy(w.x, w.y, { r: ENEMY_R, barW: 32, hp: ENEMY_HP, color: COL_ENEMY, stroke: COL_ENEMY_S, contact: CONTACT_DPS, speed: ENEMY_SPEED, gold: Phaser.Math.Between(1, 3) });
    }
  }

  // ---- Fog of War --------------------------------------------
  function reveal(c, r) {
    const ex = state.explored[state.map];
    for (let dc = -REVEAL_R; dc <= REVEAL_R; dc++) for (let dr = -REVEAL_R; dr <= REVEAL_R; dr++) {
      if (dc * dc + dr * dr > REVEAL_R * REVEAL_R + 1) continue;
      const nc = c + dc, nr = r + dr;
      if (nc < 0 || nr < 0 || nc >= state.cols || nr >= state.rows) continue;
      const k = nc + ',' + nr; if (!ex.has(k)) { ex.add(k); miniDirty = true; }
    }
  }

  // ---- Karten-Grafik -----------------------------------------
  function drawMapGraphics(g, cell) {
    const m = MAPS[state.map], ex = state.explored[state.map];
    g.clear();
    g.fillStyle(0x11100e, 1); g.fillRect(0, 0, m.cols * cell, m.rows * cell);
    g.fillStyle(m.mini, 1);
    ex.forEach(key => { const p = key.split(','); g.fillRect(p[0] * cell, p[1] * cell, cell, cell); });
    m.portals.forEach(p => { if (!ex.has(p.tx + ',' + p.ty)) return; g.fillStyle(p.mini, 1); g.fillRect(p.tx * cell - cell * 0.4, p.ty * cell - cell * 0.4, cell * 1.8, cell * 1.8); });
    m.stations.forEach(s => { if (!state.discovered.has(s.id)) return; g.fillStyle(COL_STATION, 1); g.fillRect(s.tx * cell - cell * 0.5, s.ty * cell - cell * 0.5, cell * 2, cell * 2); });
    const px = state.playerTile.c * cell + cell / 2, py = state.playerTile.r * cell + cell / 2, pr = Math.max(cell, 2.5);

    g.lineStyle(1.5, 0xffffff, 0.9); g.strokeCircle(px, py, pr);

  // ---- Eingabe -----------------------------------------------
  function onPointerDown(p) {
    if (state.dialogueOpen) {
      if (dlgBtn.visible && inRect(p, dlgBtn.x - dlgBtn.width / 2, dlgBtn.y - dlgBtn.height / 2, dlgBtn.width, dlgBtn.height)) { const a = dlgBtnAction; if (a) a(); return; }
      advanceDialogue(); return;
    }
    if (state.storeOpen) {
      if (storeCloseRef && Phaser.Math.Distance.Between(p.x, p.y, storeCloseRef.x, storeCloseRef.y) <= 24) { closeStore(); return; }
      for (const b of storeButtons) if (inRect(p, b.rect.x - b.rect.width / 2, b.rect.y - b.rect.height / 2, b.rect.width, b.rect.height)) { if (b.action === 'sell') sellAll(b.id); else buyPotion(); return; }
      if (storePanelRef && !inRect(p, storePanelRef.x - storePanelRef.width / 2, storePanelRef.y, storePanelRef.width, storePanelRef.height)) closeStore();
      return;
    }
    if (state.tycoonOpen) {
      if (tyCloseRef && Phaser.Math.Distance.Between(p.x, p.y, tyCloseRef.x, tyCloseRef.y) <= 24) { closeTycoon(); return; }
      for (const b of tyButtons) if (inRect(p, b.rect.x - b.rect.width / 2, b.rect.y - b.rect.height / 2, b.rect.width, b.rect.height)) { buyBuilding(b.k); return; }
      if (tyPanelRef && !inRect(p, tyPanelRef.x - tyPanelRef.width / 2, tyPanelRef.y, tyPanelRef.width, tyPanelRef.height)) closeTycoon();
      return;
    }
    if (state.workshopOpen) {
      if (wsCloseRef && Phaser.Math.Distance.Between(p.x, p.y, wsCloseRef.x, wsCloseRef.y) <= 24) { closeWorkshop(); return; }
      for (const b of wsButtons) if (inRect(p, b.rect.x - b.rect.width / 2, b.rect.y - b.rect.height / 2, b.rect.width, b.rect.height)) { buyUpgrade(b.id); return; }
      if (wsPanelRef && !inRect(p, wsPanelRef.x - wsPanelRef.width / 2, wsPanelRef.y, wsPanelRef.width, wsPanelRef.height)) closeWorkshop();
      return;
    }
    if (state.inventoryOpen) { closeInventory(); return; }
    if (state.travelOpen) {
      if (hit(ftClose, p, 26)) { closeTravel(); return; }
      for (const b of ftButtons) if (b.station && b.bg && inRect(p, b.bg.x - b.bg.width / 2, b.bg.y, b.bg.width, b.bg.height)) { const st = b.station; closeTravel(); transitionTo(st.mapId, { c: st.tx, r: st.ty }); return; }
      closeTravel(); return;
    }
    if (state.fullMapOpen) { closeFullMap(); return; }
    if (ctxBg.visible && inRect(p, ctxBg.x - ctxBg.width / 2, ctxBg.y - ctxBg.height / 2, ctxBg.width, ctxBg.height)) { doContext(); return; }
    if (hit(invBtn, p, 24)) { openInventory(); return; }
    if (state.miniCollapsed) { if (hit(miniExpand, p, 22)) { state.miniCollapsed = false; setMiniVisible(true); miniDirty = true; return; } }
    else {
      if (hit(miniCollapse, p, 18)) { state.miniCollapsed = true; setMiniVisible(false); return; }
      if (inRect(p, miniBg.x, miniBg.y, miniBg.width, miniBg.height)) { openFullMap(); return; }
    }
    if (Phaser.Math.Distance.Between(p.x, p.y, shootBtn.x, shootBtn.y) <= 52) { shooting = true; shootId = p.id; shootBtn.setScale(0.92); fireBullet(); fireTimer = fireMs(); return; }
    for (const ab of abilities) if (Phaser.Math.Distance.Between(p.x, p.y, ab.btn.x, ab.btn.y) <= 34) { useAbility(ab.id); return; }
    // NPC direkt antippen (Weltkoordinaten, da im Weltraum)
    if (npcSprites.length) {
      const wp = sceneRef.cameras.main.getWorldPoint(p.x, p.y);
      for (const n of npcSprites) if (Phaser.Math.Distance.Between(wp.x, wp.y, n.x, n.y) < 42) { openDialogue(n.def); return; }
    }
    if (!stick.active && p.x < sceneRef.scale.width / 2) {
      stick.active = true; stick.id = p.id; stick.baseX = p.x; stick.baseY = p.y;
      stickBase.setPosition(p.x, p.y).setVisible(true); stickThumb.setPosition(p.x, p.y).setVisible(true); updateStick(p.x, p.y);
    }
  }
  function setMiniVisible(v) { [miniBg, miniTitle, miniGfx, miniCollapse].forEach(o => o.setVisible(v)); miniExpand.setVisible(!v); }

  // ---- Kontext-Aktion ----------------------------------------
  function showContext(label) { ctxText.setText(label); ctxBg.width = Math.max(180, ctxText.width + 32); ctxBg.setVisible(true); ctxText.setVisible(true); }
  function hideContext() { ctxBg.setVisible(false); ctxText.setVisible(false); }
  function doContext() {
    if (!state.ctx) return;
    if (state.ctx.type === 'portal') { const p = state.ctx.target; transitionTo(p.to, p.spawn); }
    else if (state.ctx.type === 'station') { const d = Object.keys(STATION_INDEX).filter(id => state.discovered.has(id)); if (d.length >= 2) openTravel(); else toast('Bahnhof entdeckt – finde weitere für Zugreisen'); }
    else if (state.ctx.type === 'shop') {
      const id = state.ctx.target.id;
      if (id === 'store') openStore(); else if (id === 'werkstatt') openWorkshop(); else if (BUILDINGS[id]) openTycoon();
    }
  }

  // ---- Werkstatt (Upgrade-Baum, gesperrt bis Reveal) ---------
  function openWorkshop() {
    if (state.storeOpen || state.travelOpen || state.inventoryOpen || state.fullMapOpen) return;
    state.workshopOpen = true; hideContext();
    const size = sceneRef.scale.gameSize, ids = Object.keys(UPGRADES);
    const pw = Math.min(360, size.width * 0.94), rowH = 46, headH = 66, footH = 38;
    const ph = headH + ids.length * (rowH + 6) + footH;
    const px = size.width / 2, py = (size.height - ph) / 2;
    const add = o => { wsUI.push(o); return o; };
    add(sceneRef.add.rectangle(0, 0, size.width, size.height, 0x000000, 0.72).setOrigin(0, 0).setScrollFactor(0).setDepth(50));
    wsPanelRef = add(sceneRef.add.rectangle(px, py, pw, ph, 0x11100e, 0.97).setOrigin(0.5, 0).setStrokeStyle(2, 0xc9a24a, 0.7).setScrollFactor(0).setDepth(51));
    add(sceneRef.add.text(px, py + 10, '🔧  Werkstatt', { fontFamily: 'system-ui', fontSize: '17px', color: '#f3e9d2' }).setOrigin(0.5, 0).setScrollFactor(0).setDepth(52));
    add(sceneRef.add.text(px, py + 34, state.isRevealed ? 'Android-Modifikationen' : 'Nur Waffen-Tuning · Körper-Mods gesperrt', { fontFamily: 'system-ui', fontSize: '12px', color: state.isRevealed ? '#7dd3fc' : '#cbb894' }).setOrigin(0.5, 0).setScrollFactor(0).setDepth(52));
    wsCloseRef = add(sceneRef.add.text(px + pw / 2 - 20, py + 12, '✕', { fontFamily: 'system-ui', fontSize: '22px', color: '#f3e9d2' }).setOrigin(0.5).setScrollFactor(0).setDepth(52));
    let y = py + headH;
    ids.forEach(id => {
      const up = UPGRADES[id], lvl = state.upgrades[id], locked = up.bodyMod && !state.isRevealed, maxed = lvl >= up.max;
      const nm = up.name[state.isRevealed ? 1 : 0], cost = up.base * (lvl + 1);
      add(sceneRef.add.text(px - pw / 2 + 14, y + rowH / 2 - 7, up.icon + '  ' + (locked ? up.desc : nm), { fontFamily: 'system-ui', fontSize: '14px', color: locked ? '#8a8172' : '#f3e9d2' }).setOrigin(0, 0.5).setScrollFactor(0).setDepth(52));
      add(sceneRef.add.text(px - pw / 2 + 14, y + rowH / 2 + 10, locked ? '🔒 nach dem Erwachen' : ('Stufe ' + lvl + '/' + up.max), { fontFamily: 'system-ui', fontSize: '11px', color: '#a8a090' }).setOrigin(0, 0.5).setScrollFactor(0).setDepth(52));
      if (!locked && !maxed) {
        const can = state.gold >= cost;
        const btn = add(sceneRef.add.rectangle(px + pw / 2 - 58, y + rowH / 2, 96, 34, can ? 0x3f6212 : 0x2a2f3a, 0.95).setStrokeStyle(2, 0xf3e9d2, 0.4).setScrollFactor(0).setDepth(52));
        add(sceneRef.add.text(btn.x, btn.y, cost + ' 💰', { fontFamily: 'system-ui', fontSize: '13px', color: '#f3e9d2' }).setOrigin(0.5).setScrollFactor(0).setDepth(53));
        storeButtonsPush(btn, id);
      } else {
        add(sceneRef.add.text(px + pw / 2 - 58, y + rowH / 2, maxed ? 'MAX' : '🔒', { fontFamily: 'system-ui', fontSize: '13px', color: '#8a8172' }).setOrigin(0.5).setScrollFactor(0).setDepth(52));
      }
      y += rowH + 6;
    });
    add(sceneRef.add.text(px, py + ph - 26, '💰 ' + state.gold, { fontFamily: 'system-ui', fontSize: '14px', color: '#fde047' }).setOrigin(0.5, 0).setScrollFactor(0).setDepth(52));
  }
  function storeButtonsPush(btn, id) { wsButtons.push({ rect: btn, id }); }
  function closeWorkshop() { state.workshopOpen = false; wsUI.forEach(o => o.destroy()); wsUI = []; wsButtons = []; wsCloseRef = null; wsPanelRef = null; }
  function buyUpgrade(id) {
    const up = UPGRADES[id], lvl = state.upgrades[id];
    if (up.bodyMod && !state.isRevealed) { toast('🔒 Erst nach dem Erwachen'); return; }
    if (lvl >= up.max) { toast('Bereits max'); return; }
    const cost = up.base * (lvl + 1);
    if (state.gold < cost) { toast('Nicht genug Gold (' + state.gold + '/' + cost + ')'); return; }
    state.gold -= cost; state.upgrades[id]++; applyUpgrades(); updateGold();
    toast(up.name[state.isRevealed ? 1 : 0] + ' → Stufe ' + state.upgrades[id]); save();
    closeWorkshop(); openWorkshop();
  }

  // ---- NPC-Dialog (mit Anti-Doppeltipp) ----------------------
  function openDialogue(def) {
    if (state.dialogueOpen) return;                 // Anti-Doppeltipp
    state.dialogueOpen = true;
    const lines = (state.isRevealed ? def.linesPost : def.linesPre) || def.linesPre;
    state.dlg = { def, lines, i: 0 };
    hideContext(); renderDialogue();
  }
  function renderDialogue() {
    const d = state.dlg; if (!d) return;
    const q = d.def.quest, flavorN = d.lines.length;
    dlgName.setText(d.def.name); hideDlgBtn();
    if (d.i < flavorN) {
      dlgText.setText(d.lines[d.i]);
      dlgHint.setText((d.i === flavorN - 1 && !q) ? '▶ Schließen' : '▶ Weiter');
    } else {   // Quest-Seite
      const st = questStateOf(q.id);
      if (st === 'available') { dlgText.setText(q.offerText + '\n\nBelohnung: ' + rewardStr(q)); showDlgBtn('📜 Auftrag annehmen', () => acceptQuest(q)); dlgHint.setText('▶ ablehnen'); }
      else if (st === 'active') {
        if (questComplete(q)) { dlgText.setText(q.completeText + '\n\nBelohnung: ' + rewardStr(q)); showDlgBtn('✅ Abgeben', () => turnInQuest(q)); dlgHint.setText(''); }
        else { dlgText.setText(q.activeText + '\n\nFortschritt: ' + questProgress(q)); dlgHint.setText('▶ Schließen'); }
      } else { dlgText.setText(q.doneText); dlgHint.setText('▶ Schließen'); }
    }
    [dlgBg, dlgName, dlgText, dlgHint].forEach(o => o.setVisible(true));
    layoutUI(sceneRef.scale.gameSize);
  }
  function advanceDialogue() {
    const d = state.dlg; if (!d) { closeDialogue(); return; }
    const total = d.lines.length + (d.def.quest ? 1 : 0);
    if (d.i >= total - 1) { closeDialogue(); return; }
    d.i++; renderDialogue();
  }
  function closeDialogue() {
    state.dialogueOpen = false; state.dlg = null; hideDlgBtn();
    [dlgBg, dlgName, dlgText, dlgHint].forEach(o => o.setVisible(false));
  }
  function showDlgBtn(txt, action) { dlgBtnText.setText(txt); dlgBtnAction = action; dlgBtn.setVisible(true); dlgBtnText.setVisible(true); }
  function hideDlgBtn() { dlgBtnAction = null; if (dlgBtn) dlgBtn.setVisible(false); if (dlgBtnText) dlgBtnText.setVisible(false); }

  // ---- Quests -------------------------------------------------
  function questStateOf(id) { return state.quests[id] || 'available'; }
  function questComplete(q) {
    if (q.kind === 'kill') return (kills - (state.questBase[q.id] || 0)) >= q.count;
    if (q.kind === 'collect') return (state.inventory[q.item] || 0) >= q.count;
    return false;
  }
  function questProgress(q) {
    if (q.kind === 'kill') return Math.min(kills - (state.questBase[q.id] || 0), q.count) + '/' + q.count;
    if (q.kind === 'collect') return Math.min(state.inventory[q.item] || 0, q.count) + '/' + q.count + ' ' + ITEMS[q.item].icon;
    return '';
  }
  function rewardItemName(id) { return id === 'potion' ? ('🍶 ' + T('potion')) : (ITEMS[id] ? ITEMS[id].icon + ' ' + ITEMS[id].name : ''); }
  function rewardStr(q) { return q.rewardGold + ' 💰' + (q.rewardItem ? ' + ' + rewardItemName(q.rewardItem) : ''); }
  function acceptQuest(q) {
    state.quests[q.id] = 'active';
    if (q.kind === 'kill') state.questBase[q.id] = kills;
    toast('📜 Auftrag angenommen: ' + q.title); save(); updateNpcIndicators(); closeDialogue();
  }
  function turnInQuest(q) {
    if (!questComplete(q)) return;
    state.gold += q.rewardGold; updateGold();
    if (q.kind === 'collect') state.inventory[q.item] = (state.inventory[q.item] || 0) - q.count;
    if (q.rewardItem === 'potion') { state.potions++; updateAbilityUI(); }
    else if (q.rewardItem && ITEMS[q.rewardItem]) state.inventory[q.rewardItem] = (state.inventory[q.rewardItem] || 0) + 1;
    state.quests[q.id] = 'done';
    toast('✅ ' + q.title + ' erledigt! +' + q.rewardGold + ' Gold'); save(); updateNpcIndicators(); closeDialogue();
  }
  function updateNpcIndicators() {
    for (const n of npcSprites) {
      if (!n.gear) continue; const q = n.def.quest;
      if (!q) { n.gear.setVisible(false); continue; }
      const st = questStateOf(q.id);
      if (st === 'done') n.gear.setVisible(false);
      else { n.gear.setVisible(true); n.gear.setText(st === 'available' ? '⚙️' : (questComplete(q) ? '❗' : '⏳')); }
    }
  }
  function updateQuestTracker() {
    if (!questText) return;
    let s = '';
    for (const n of npcSprites) { const q = n.def.quest; if (q && questStateOf(q.id) === 'active') { s = '📜 ' + q.title + '  ' + questProgress(q); break; } }
    // auch außerhalb der Stadt: erste aktive Quest global finden
    if (!s) for (const id in state.quests) if (state.quests[id] === 'active') { const q = findQuest(id); if (q) { s = '📜 ' + q.title + '  ' + questProgress(q); break; } }
    if (questText.text !== s) questText.setText(s);
  }
  function findQuest(id) {
    for (const mid in MAPS) { const ns = MAPS[mid].npcs || []; for (const n of ns) if (n.quest && n.quest.id === id) return n.quest; }
    return null;
  }

  // ---- Schuss / Spezial-Attacken -----------------------------
  function fireBulletAngle(a) {
    if (!sceneRef || !player || state.transitioning) return;
    const dx = Math.cos(a), dy = Math.sin(a);
    const sprite = sceneRef.add.circle(player.x + dx * (PLAYER_R + 6), player.y + dy * (PLAYER_R + 6), BULLET_R, COL_BULLET).setStrokeStyle(2, 0xb45309).setDepth(6);
    bullets.push({ sprite, vx: dx * BULLET_SPEED, vy: dy * BULLET_SPEED, life: BULLET_LIFE });
  }
  function nearestEnemy(range) {
    let best = null, bd = (range === undefined ? Infinity : range);
    for (const e of enemies) { const d = Phaser.Math.Distance.Between(player.x, player.y, e.c.x, e.c.y); if (d < bd) { bd = d; best = e; } }
    return best;
  }
  function aimAngle() { const t = nearestEnemy(AIM_RANGE); return t ? Math.atan2(t.c.y - player.y, t.c.x - player.x) : player.facing; }
  function fireBullet() { const a = aimAngle(); player.facing = a; player.rotation = a; fireBulletAngle(a); }   // Auto-Ziel auf nächsten Gegner
  function castSpread() { const base = aimAngle(); for (let i = 0; i < SPREAD_COUNT; i++) fireBulletAngle(base - SPREAD_ARC / 2 + SPREAD_ARC * (i / (SPREAD_COUNT - 1))); }
  function castDash() {
    const a = player.facing;
    const nx = Phaser.Math.Clamp(player.x + Math.cos(a) * DASH_DIST, state.bounds.minX, state.bounds.maxX);
    const ny = Phaser.Math.Clamp(player.y + Math.sin(a) * DASH_DIST, state.bounds.minY, state.bounds.maxY);
    sceneRef.tweens.add({ targets: player, x: nx, y: ny, duration: 150, ease: 'Cubic.out' });
    state.invulnUntil = sceneRef.time.now + 450;
  }
  function usePotion() {
    if (state.potions <= 0) { toast('Keine Heiltränke'); return; }
    if (state.hp >= state.maxHp) { toast('Leben bereits voll'); return; }
    state.hp = Math.min(state.maxHp, state.hp + POTION_HEAL); state.potions--; updateLife(); updateAbilityUI(); toast('🍶 ' + T('potion') + ' +' + POTION_HEAL);
  }
  function useAbility(id) {
    if (id === 'spread') { if (state.cd.spread > 0) return; castSpread(); state.cd.spread = SPREAD_CD; }
    else if (id === 'dash') { if (state.cd.dash > 0) return; castDash(); state.cd.dash = DASH_CD; }
    else if (id === 'potion') { usePotion(); }
    updateAbilityUI();
  }
  function updateAbilityUI() {
    for (const ab of abilities) {
      if (ab.id === 'potion') { ab.cdText.setText('' + state.potions); ab.btn.setAlpha(state.potions > 0 ? 0.9 : 0.4); continue; }
      const cd = state.cd[ab.id] || 0;
      if (cd > 0) { ab.btn.setAlpha(0.4); ab.icon.setAlpha(0.3); ab.cdText.setText(Math.ceil(cd / 1000) + ''); }
      else { ab.btn.setAlpha(0.9); ab.icon.setAlpha(1); ab.cdText.setText(''); }
    }
  }

  // ---- Joystick ----------------------------------------------
  function updateStick(px, py) {
    let dx = px - stick.baseX, dy = py - stick.baseY; const len = Math.hypot(dx, dy);
    if (len > STICK_RADIUS) { dx = dx / len * STICK_RADIUS; dy = dy / len * STICK_RADIUS; }
    stickThumb.setPosition(stick.baseX + dx, stick.baseY + dy); stick.vx = dx / STICK_RADIUS; stick.vy = dy / STICK_RADIUS;
  }
  function resetStick() { stick.active = false; stick.id = null; stick.vx = 0; stick.vy = 0; stickBase.setVisible(false); stickThumb.setVisible(false); }

  // ---- Update ------------------------------------------------
  function update(time, delta) {
    if (!player) return;
    const dt = delta / 1000, now = sceneRef.time.now;
    const uiBlocked = state.fullMapOpen || state.travelOpen || state.inventoryOpen || state.storeOpen || state.workshopOpen || state.tycoonOpen || state.dialogueOpen;

    // Bewegung
    let vx = 0, vy = 0;
    if (!uiBlocked && stick.active) { vx = stick.vx; vy = stick.vy; }
    if (!uiBlocked) {
      if (cursors.left.isDown || wasd.left.isDown) vx = -1;
      if (cursors.right.isDown || wasd.right.isDown) vx = 1;
      if (cursors.up.isDown || wasd.up.isDown) vy = -1;
      if (cursors.down.isDown || wasd.down.isDown) vy = 1;
    }
    let mag = Math.hypot(vx, vy);
    if (mag >= STICK_DEADZONE) {
      if (mag > 1) { vx /= mag; vy /= mag; }
      player.x = Phaser.Math.Clamp(player.x + vx * moveSpeed() * dt, state.bounds.minX, state.bounds.maxX);
      player.y = Phaser.Math.Clamp(player.y + vy * moveSpeed() * dt, state.bounds.minY, state.bounds.maxY);
      player.facing = Math.atan2(vy, vx); player.rotation = player.facing;
    }
    if (colliders.length) resolveCollision();   // solide Wände/Gebäude
    shadow.setPosition(player.x, player.y + 14);
    player.setAlpha(now < state.invulnUntil && Math.floor(now / 120) % 2 === 0 ? 0.45 : 1);

    const pt = worldToTile(player.x, player.y);
    if (pt.c !== state.playerTile.c || pt.r !== state.playerTile.r) { state.playerTile = pt; reveal(pt.c, pt.r); miniDirty = true; }
    streamChunks(1);   // jeden Frame hoechstens 1 Chunk nachbacken -> ruckelfrei

    // Beim Angreifen automatisch zum nächsten Gegner ausrichten (kein Zielen per Bewegung nötig)
    if (!uiBlocked && shooting) { const t = nearestEnemy(AIM_RANGE); if (t) { const a = Math.atan2(t.c.y - player.y, t.c.x - player.x); player.facing = a; player.rotation = a; } }
    fireTimer -= delta;
    if (!uiBlocked && shooting && fireTimer <= 0) { fireBullet(); fireTimer = fireMs(); }

    // Cooldowns
    state.cd.spread = Math.max(0, state.cd.spread - delta);
    state.cd.dash = Math.max(0, state.cd.dash - delta);
    updateAbilityUI();

    // Gegner: idle bis nah -> dann verfolgen + Kontaktschaden
    let touched = false;
    for (const e of enemies) {
      const ex = player.x - e.c.x, ey = player.y - e.c.y, d = Math.hypot(ex, ey) || 1;
      if (!e.aggro) { if (d < AGGRO_RANGE) e.aggro = true; else continue; }   // erst angreifen, wenn nah genug
      else if (!e.isBoss && d > LEASH_RANGE) { e.aggro = false; continue; }   // zu weit -> beruhigt sich wieder
      if (d > PLAYER_R + e.r) { e.c.x += (ex / d) * e.speed * dt; e.c.y += (ey / d) * e.speed * dt; }
      else if (!uiBlocked && now > state.invulnUntil) { state.hp -= e.contact * dt; state.lastDamage = now; touched = true; }
    }
    if (touched) { updateLife(); if (state.hp <= 0) respawnPlayer(); }
    else if (now - state.lastDamage > REGEN_DELAY && state.hp < state.maxHp) { state.hp = Math.min(state.maxHp, state.hp + regenRate() * dt); updateLife(); }
    if (state.boss) updateBossBar();

    // Projektile
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i]; b.sprite.x += b.vx * dt; b.sprite.y += b.vy * dt; b.life -= dt;
      let hitE = false;
      for (const e of enemies) if (Phaser.Math.Distance.Between(b.sprite.x, b.sprite.y, e.c.x, e.c.y) < e.r + BULLET_R) { damageEnemy(e, dmgPerBullet()); hitE = true; break; }
      if (hitE || b.life <= 0) { b.sprite.destroy(); bullets.splice(i, 1); }
    }

    // Gold-Münzen
    for (let i = coins.length - 1; i >= 0; i--) {
      const co = coins[i], dx = player.x - co.s.x, dy = player.y - co.s.y, d = Math.hypot(dx, dy) || 1;
      if (d < PICKUP_DIST) {
        if (co.item) { state.inventory[co.item] = (state.inventory[co.item] || 0) + 1; popLoot(co.s.x, co.s.y, ITEMS[co.item].icon); }
        else { state.gold += 1; updateGold(); popGold(co.s.x, co.s.y); }
        co.s.destroy(); coins.splice(i, 1); continue;
      }
      if (d < magnetDist()) { co.s.x += (dx / d) * MAGNET_SPEED * dt; co.s.y += (dy / d) * MAGNET_SPEED * dt; }
    }

    if (!uiBlocked && !state.transitioning) updateContext();
    if (miniDirty) { refreshMaps(); miniDirty = false; }
    updateQuestTracker();
  }

  function updateContext() {
    const m = MAPS[state.map];
    // Tore: einfach reinlaufen -> automatischer Übergang
    for (const p of m.portals) {
      const w = tileToWorld(p.tx, p.ty);
      if (Phaser.Math.Distance.Between(player.x, player.y, w.x, w.y) < GATE_ENTER_DIST && sceneRef.time.now > state.portalGraceUntil) { transitionTo(p.to, p.spawn); return; }
    }
    let best = null, bestType = null, bestD = 1e9;
    for (const s of m.stations) {
      const w = tileToWorld(s.tx, s.ty), d = Phaser.Math.Distance.Between(player.x, player.y, w.x, w.y);
      if (d < DISCOVER_DIST && !state.discovered.has(s.id)) { state.discovered.add(s.id); miniDirty = true; toast('🚂 Bahnhof entdeckt: ' + s.name); }
      if (d < INTERACT_DIST && d < bestD) { best = s; bestType = 'station'; bestD = d; }
    }
    for (const sh of (m.shops || [])) { const w = tileToWorld(sh.tx, sh.ty), d = Phaser.Math.Distance.Between(player.x, player.y, w.x, w.y); if (d < INTERACT_DIST + 40 && d < bestD) { best = sh; bestType = 'shop'; bestD = d; } }
    if (best) {
      state.ctx = { type: bestType, target: best };
      if (bestType === 'station') showContext(Object.keys(STATION_INDEX).filter(id => state.discovered.has(id)).length >= 2 ? '🚂  Zugreise' : '🚂  ' + best.name);
      else if (best.id === 'store') showContext('🛒  Store — kaufen & verkaufen');
      else if (best.id === 'werkstatt') showContext(state.isRevealed ? '🔧  Werkstatt — Modifikationen' : '🔧  Werkstatt — Waffen-Tuning');
      else if (BUILDINGS[best.id]) { const b = BUILDINGS[best.id], lvl = state.economy[best.id].level; showContext(b.icon + '  ' + b.name + (lvl > 0 ? ' — Stufe ' + lvl : ' — kaufen')); }
    } else { state.ctx = null; hideContext(); }
  }

  // ---- Start -------------------------------------------------
  new Phaser.Game({
    type: Phaser.AUTO, parent: 'game', backgroundColor: '#2b2620',
    scale: { mode: Phaser.Scale.RESIZE, width: window.innerWidth, height: window.innerHeight },
    render: { antialias: true, roundPixels: true },
    scene: { create, update }
  });
  </script>
</body>
</html>
