  <title>Rust &amp; Lead</title>
  <style>
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      overflow: hidden; background: #2b2620;
      touch-action: none; -webkit-user-select: none; user-select: none;

</head>
<body>
  <div id="game"></div>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script>
  // ============================================================
  //  RUST & LEAD – Web-Prototyp (Phase 1) · Schritt 1–4 + HUD-Layout
  //  Single-File Setup · Details siehe docs/GDD.md
  //
  //  HUD-Layout (nach Diablo-Immortal-Vorbild):
  //   - Oben links:  Porträt + Spieler-Lebensbalken
  //   - Oben Mitte:  Boss-Lebensbalken
  //   - Unten rechts: Haupt-Angriff + Spezial-Attacken drumherum
  //   - Oben rechts: Minimap + Inventar-Button
  //   - Unten links: Touch-Joystick
  // ============================================================

  // ---- Grund-Konfiguration -----------------------------------
  const TILE_W = 64, TILE_H = 32, HALF_W = TILE_W / 2, HALF_H = TILE_H / 2;
  const PLAYER_SPEED = 240, PLAYER_R = 16;
  const STICK_RADIUS = 60, STICK_DEADZONE = 0.12;
  const ENEMY_R = 15, ENEMY_HP = 60, ENEMY_SPEED = 70, ENEMY_MAX = 80;
  const RESPAWN_FULL_MS = 180000, RESPAWN_MIN = 0.12;   // volle Wiederbesiedlung nach 3 Min; direkt nach Verlassen nur ~12 %
  const AIM_RANGE = 500, AGGRO_RANGE = 250, LEASH_RANGE = 520, ENEMY_PER_TILES = 70;
  const CHUNK = 20, CHUNK_RADIUS = 2;   // Boden-Streaming: Vorhalte-Ring (radius 2), sichtbar ~radius 1
  const BULLET_R = 5, BULLET_SPEED = 560, BULLET_DMG = 20, BULLET_LIFE = 1.1, FIRE_MS = 200;
  const REVEAL_R = 3, INTERACT_DIST = 46, DISCOVER_DIST = 90, GATE_ENTER_DIST = 30;
  const MAGNET_DIST = 130, PICKUP_DIST = 18, MAGNET_SPEED = 460;
  const INV_CAP = 40, CHEST_PER_TILES = 320, CHEST_INTERACT = 52;   // Inventar-Limit & Loot-Kisten
  const SALOON_INCOME = 1, SAVE_KEY = 'rustlead_save_v1', N_SLOTS = 5;
  const slotKey = i => SAVE_KEY + '_s' + i;
  // Kurz-Metadaten eines Slots ohne vollständiges Laden (für Titel-/Slot-Auswahl).
  function slotInfo(i) {
    try {
      const raw = localStorage.getItem(slotKey(i)); if (!raw) return null;
      const s = JSON.parse(raw);
      return { chapter: s.chapter || 1, guild: s.guild || null, level: s.level || 1, ngPlus: s.ngPlus || 0, gameWon: !!s.gameWon, ts: s.ts || 0 };
    } catch (e) { return null; }
  }

  // Spieler-Leben & Kampf
  const PLAYER_MAX_HP = 100, CONTACT_DPS = 12, INVULN_MS = 1200, REGEN_DELAY = 3000, REGEN_RATE = 8;
  const LIFE_W = 150, BOSSBAR_W = 260;
  // Spezial-Attacken
  const SPREAD_COUNT = 7, SPREAD_ARC = 1.0, SPREAD_CD = 3000;
  const DASH_DIST = 190, DASH_CD = 2500;
  const POTION_HEAL = 50, POTION_START = 3;
  // Wurf-Granaten (Flächen-Ordnung) & feindliche Projektile
  const GRENADE_R = 115, ACID_CD = 5000, SHOCK_CD = 6000, ACID_POT = 14;
  const E_BULLET_SPEED = 300, E_BULLET_R = 5;
  // Boss
  const BOSS_HP = 700, BOSS_R = 28, BOSS_SPEED = 46, BOSS_CONTACT = 28, BOSS_GOLD = 20, BOSS_KILLS_TRIGGER = 8;
  const BOSS_NAMES = ['Rost-Baron', 'Blei-Molch', 'Schrott-Koloss', 'Kaktus-König'];
  // Unique-Anführer (Diablo-Champion): selten in Kritter-Hallen, benannt, aufgebohrt, garantiertes Legendary.
  const UNIQUE_NAMES = ['Rostzahn, der Grubenkönig', 'Blechhaut die Unersättliche', 'Öldarm der Verschlinger', 'Sable Schnellklaue', 'Die Rasselnde Mutter', 'Kessel-Baronin Vex'];
  const UNIQUE_SLOTS = ['weapon', 'armor', 'gadget', 'boots', 'helmet'];   // Slots mit benannten Legendaries
  const BOUNTY_NAMES = ['Gefährlicher Vince', 'Dynamit-Dolores', 'Der Schakal', 'Öl-Otis', 'Klapperschlangen-Kate', 'Halunke Hank'];
  // „Der Abstieg": pro Ebene ein zufälliger Modifikator, der die Begegnung würzt.
  const ABYSS_MODS = [
    { id: 'horde',   name: 'Andrang',      icon: '👥', desc: 'mehr Gegner' },
    { id: 'brute',   name: 'Überdruck',    icon: '💪', desc: 'zäher & härter' },
    { id: 'swift',   name: 'Rasende Meute', icon: '💨', desc: 'schnellere Gegner' },
    { id: 'elite',   name: 'Elite-Nest',   icon: '☠', desc: 'mehr Elite-Bosse' }
  ];
  // Abstieg-Biome: rotieren alle 5 Ebenen, damit der Endlosmodus optisch nie stehenbleibt.
  // Jedes Biom setzt Bodenfarben, Hintergrund, Stollen-Label und einen Ankunfts-Ausruf.
  const ABYSS_BAND = 5;
  const ABYSS_BIOMES = [
    { id: 'stollen', name: 'Verlassene Stollen', decor: 'STOLLEN', floorA: 0x4b5563, floorB: 0x3f4652, grid: 0x2b3038, mini: 0x6b7686, bg: 0x15171b, callout: 'Verlassene Stollen. Hier endete die Minengesellschaft — hier beginnst du.' },
    { id: 'frost',   name: 'Frostkavernen',      decor: 'EISHÖHLE', floorA: 0x3b5a6b, floorB: 0x32505f, grid: 0x244049, mini: 0x7cc0d8, bg: 0x0a1418, callout: 'Frostkavernen. Der Atem gefröre — hättest du noch einen.' },
    { id: 'magma',   name: 'Magma-Schlund',      decor: 'MAGMA',   floorA: 0x5a2f22, floorB: 0x49261b, grid: 0x3a1c12, mini: 0xd2803a, bg: 0x1a0c06, callout: 'Magma-Schlund. Der Fels glüht, das Öl in deinen Adern kocht.' },
    { id: 'sporen',  name: 'Sporentiefe',        decor: 'SPOREN',  floorA: 0x3a4a2f, floorB: 0x2f3d26, grid: 0x22301c, mini: 0x7ba053, bg: 0x0e160a, callout: 'Sporentiefe. Etwas Lebendiges wächst durch den Stahl.' },
    { id: 'herz',    name: 'Fleisch-Maschinen-Tiefe', decor: 'HERZ', floorA: 0x3a2740, floorB: 0x2f2035, grid: 0x211628, mini: 0x9a5aad, bg: 0x0c0610, callout: 'Fleisch und Getriebe verschmelzen. Du bist dem Herzen nah.' }
  ];
  function abyssBiomeFor(depth) { return ABYSS_BIOMES[Math.floor((Math.max(1, depth) - 1) / ABYSS_BAND) % ABYSS_BIOMES.length]; }
  // Overworld-Biome: Regionen (Kreise in Kachelkoordinaten), die man beim Erkunden entdeckt.
  // Jedes Biom hat eine eigene Bodenpalette; dazwischen bleibt die Standard-Wüste.
  const DESERT_BIOME = { id: 'desert', name: 'Wüste', icon: '🏜', floorA: 0xd9b38c, floorB: 0xcda877, grid: 0xb8935f };
  const OVERWORLD_BIOMES = [
    { id: 'oasis',    name: 'Grüne Senke',       icon: '🌿', cx: 15, cy: 64, rad: 13, floorA: 0x6f9e54, floorB: 0x5f8c48, grid: 0x3f6630, flora: ['tree', 'water', 'tree'], floraColor: 0x4f9440, floraCount: 12 },
    { id: 'forest',   name: 'Rostwald',          icon: '🌲', cx: 66, cy: 64, rad: 15, floorA: 0x4f7a45, floorB: 0x436b3b, grid: 0x2c4a27, flora: ['tree'], floraColor: 0x356b2c, floraCount: 22 },
    { id: 'highland', name: 'Kupfer-Hochland',   icon: '⛰',  cx: 65, cy: 13, rad: 15, floorA: 0x9a8468, floorB: 0x87735a, grid: 0x5a4a38, flora: ['rock'], floraColor: 0x8f8472, floraCount: 16 },
    { id: 'salt',     name: 'Salzpfanne',        icon: '🧂', cx: 16, cy: 17, rad: 12, floorA: 0xd7d2bf, floorB: 0xc8c2ac, grid: 0xa8a28c, flora: ['salt'], floraColor: 0xece7d8, floraCount: 14 }
  ];
  function biomeAtTile(c, r) {
    for (const b of OVERWORLD_BIOMES) { const dc = c - b.cx, dr = r - b.cy; if (dc * dc + dr * dr <= b.rad * b.rad) return b; }
    return DESERT_BIOME;
  }
  // Natur-Deko: nicht-solide Sprites, die ein Biom greifbar machen (Boden-Palette allein reicht nicht).
  function drawFlora(kind, x, y, b) {
    const add = o => { o.setDepth(1); mapObjects.push(o); return o; };
    add(sceneRef.add.ellipse(x, y + 5, 16, 7, 0x000000, 0.14));   // weicher Bodenschatten
    if (kind === 'water') {
      add(sceneRef.add.ellipse(x, y, 40, 21, 0x2f7fb0, 0.85).setStrokeStyle(2, 0x1c5a80));
      add(sceneRef.add.ellipse(x - 6, y - 3, 14, 6, 0x6fc0e0, 0.55));
    } else if (kind === 'tree') {
      add(sceneRef.add.rectangle(x, y - 6, 4, 14, 0x5a4128));
      add(sceneRef.add.ellipse(x, y - 18, 22, 20, b.floraColor).setStrokeStyle(2, 0x1f3d16));
      add(sceneRef.add.ellipse(x - 6, y - 22, 9, 8, 0xffffff, 0.10));
    } else if (kind === 'rock') {
      add(sceneRef.add.polygon(x, y - 2, [-13, 7, -7, -9, 5, -11, 14, 5, 7, 9], b.floraColor).setStrokeStyle(2, 0x3a3226));
      add(sceneRef.add.polygon(x - 2, y - 4, [-6, 2, -2, -5, 4, -4], 0xffffff, 0.10));
    } else if (kind === 'salt') {
      add(sceneRef.add.polygon(x, y - 2, [0, -12, 7, 0, 0, 8, -7, 0], 0xece7d8, 0.92).setStrokeStyle(1, 0xbdb69f));
      add(sceneRef.add.polygon(x + 8, y + 1, [0, -7, 4, 0, 0, 5, -4, 0], 0xdcd6c4, 0.85).setStrokeStyle(1, 0xbdb69f));
    } else if (kind === 'cactus') {
      add(sceneRef.add.rectangle(x, y - 8, 6, 20, 0x5c7a3a).setStrokeStyle(1, 0x38491f));
      add(sceneRef.add.rectangle(x + 6, y - 10, 8, 5, 0x5c7a3a).setStrokeStyle(1, 0x38491f));
      add(sceneRef.add.rectangle(x - 6, y - 6, 8, 5, 0x5c7a3a).setStrokeStyle(1, 0x38491f));
    }
  }
  function scatterBiomeDecor(m) {
    if (!m.biomed) return;
    const avoid = m.portals.map(p => tileToWorld(p.tx, p.ty));
    const free = (x, y) => !avoid.some(a => Phaser.Math.Distance.Between(a.x, a.y, x, y) < 100);
    for (const b of OVERWORLD_BIOMES) {                       // Biom-Deko
      for (let i = 0; i < (b.floraCount || 14); i++) {
        const ang = Math.random() * Math.PI * 2, rr = Math.sqrt(Math.random()) * (b.rad - 1);
        const c = Math.round(b.cx + Math.cos(ang) * rr), r = Math.round(b.cy + Math.sin(ang) * rr);
        if (c < 1 || r < 1 || c >= m.cols - 1 || r >= m.rows - 1) continue;
        const w = tileToWorld(c, r); if (!free(w.x, w.y)) continue;
        drawFlora(b.flora[Phaser.Math.Between(0, b.flora.length - 1)], w.x, w.y, b);
      }
    }
    for (let i = 0; i < 22; i++) {                            // spärliche Wüsten-Kakteen dazwischen
      const c = Phaser.Math.Between(2, m.cols - 3), r = Phaser.Math.Between(2, m.rows - 3);
      if (biomeAtTile(c, r).id !== 'desert') continue;
      const w = tileToWorld(c, r); if (!free(w.x, w.y)) continue;
      drawFlora('cactus', w.x, w.y, DESERT_BIOME);
    }
  }
  // Kritter-Hallen (Mini-Dungeons): pro Betreten zufälliges Thema (Schwarm-Art + Palette) für Wiederspielwert.
  const CRITTER_THEMES = [
    { id: 'rats',     name: 'Rattennest',    type: 'fauna',    count: 11, floorA: 0x413a44, floorB: 0x37313f, grid: 0x241f2b, mini: 0x5a4f66, bg: 0x0d0a12 },
    { id: 'klaeffer', name: 'Kläffer-Wurf',  type: 'klaeffer', count: 9,  floorA: 0x2f3a40, floorB: 0x283136, grid: 0x1b2226, mini: 0x4a5e66, bg: 0x0a1013 },
    { id: 'outlaws',  name: 'Banditenloch',  type: 'outlaw',   count: 7,  floorA: 0x453a2f, floorB: 0x3a3026, grid: 0x28201a, mini: 0x6b5a48, bg: 0x120d08 }
  ];
  function applyHallTheme() {
    const th = CRITTER_THEMES[Phaser.Math.Between(0, CRITTER_THEMES.length - 1)], m = MAPS.critter_hall;
    m.floorA = th.floorA; m.floorB = th.floorB; m.grid = th.grid; m.mini = th.mini; m.bg = th.bg;
    m.name = 'Verlassene Halle — ' + th.name;
    state.hallTheme = th.id; return th;
  }
  function spawnUniqueLeader(x, y, th, mul) {
    const t = ENEMY_TYPES[th.type], name = UNIQUE_NAMES[Phaser.Math.Between(0, UNIQUE_NAMES.length - 1)];
    const e = addEnemy(x, y, { r: (t.r || 15) + 12, barW: 66, hp: Math.round((t.hp || 60) * 6), color: 0x7c3aed, stroke: 0x3b0764,
      contact: Math.round((t.contact || 10) * 1.5), speed: t.speed || 90, gold: 45, cls: t.cls, sub: t.sub, armor: (t.armor || 0) + 6, ranged: t.ranged || null, isBoss: true, name });
    e.elite = true; e.unique = true; scaleEnemyHp(e, mul);
    state.boss = e; setBossBar(e);   // Champion bekommt eine benannte Lebensleiste
    return e;
  }
  function spawnCritterPack() {
    const th = CRITTER_THEMES.find(t => t.id === state.hallTheme) || CRITTER_THEMES[0];
    const m = MAPS.critter_hall, mul = mapHpMul(m), c0 = tileToWorld(8, 6);
    const unique = Math.random() < 0.30;                 // ~30 %: Champion-Pack mit Unique-Anführer
    const packN = th.count + (unique ? 3 : 0);           // Champion führt ein größeres Rudel
    for (let i = 0; i < packN; i++) { const a = Math.random() * Math.PI * 2, d = 24 + Math.random() * 100; scaleEnemyHp(spawnTyped(th.type, c0.x + Math.cos(a) * d, c0.y + Math.sin(a) * d), mul); }
    if (unique) { const u = spawnUniqueLeader(c0.x, c0.y - 24, th, mul); toast('✦ Ein Champion lauert hier: ' + u.name + ' — erlege ihn für ein Legendary!'); }
    else scaleEnemyHp(spawnElite(c0.x, c0.y - 24), mul);   // sonst normaler Elite-Anführer (Boss-Kiste)
  }
  function checkBiome(c, r) {
    const b = biomeAtTile(c, r);
    if (b.id === state.curBiome) return;
    state.curBiome = b.id;
    if (mapNameText) mapNameText.setText(b.icon + ' ' + b.name + ((state.ngPlus || 0) > 0 ? '   ·   🔄 NG+' + state.ngPlus : ''));
    if (b.id === 'desert') return;
    const first = !state.biomesSeen.has(b.id);
    if (first) { state.biomesSeen.add(b.id); save(); checkAchievements(); }
    toast(b.icon + (first ? '  Neu entdeckt: ' : '  ') + b.name);
  }
  function applyAbyssBiome(depth) {
    const b = abyssBiomeFor(depth), m = MAPS.abyss;
    m.floorA = b.floorA; m.floorB = b.floorB; m.grid = b.grid; m.mini = b.mini; m.bg = b.bg;
    if (m.decor && m.decor[0]) m.decor[0].label = b.decor;
    state.abyssBiome = b.id; return b;
  }
  const TUT_STEPS = [
    '👣 Bewege dich mit dem Stick · sprich mit Mabel (⚙️) für deinen Auftrag',
    '🚪 Verlasse die Stadt durchs Tor (Norden) & besiege Gegner in der Wüste',
    '🎒 Öffne dein Inventar (Knopf oben rechts)',
    '🧤 Tippe ein Ausrüstungsteil an → „Anlegen"',
    '✦ Steig eine Stufe auf → Reiter „Fähigkeiten" → Perk setzen'
  ];

  // Farben
  const COL_PLAYER = 0x3b82f6, COL_PLAYER_S = 0x1e3a8a, COL_NOSE = 0x93c5fd;
  const COL_ENEMY = 0xef4444, COL_ENEMY_S = 0x7f1d1d;
  const COL_BULLET = 0xfacc15, COL_HP = 0xff3b30, COL_STATION = 0xfacc15;
  const COL_GOLD = 0xfde047, COL_GOLD_S = 0x92700a;
  const COL_LIFE = 0x22c55e, COL_BOSS = 0xf97316;
  const POST_COL = 0x7a5636, POST_DARK = 0x4a3620;   // Palisade

  // Loot: Schrott & Steampunk-Bauteile (im Store verkaufbar / spaeter fuer Upgrades)
  const ITEMS = {
    schrott:   { name: 'Schrott',   icon: '🔩', color: 0x9ca3af, value: 2 },
    zahnrad:   { name: 'Zahnrad',   icon: '⚙️', color: 0xb08d57, value: 8 },
    dampfkern: { name: 'Dampfkern', icon: '♨️', color: 0x38bdf8, value: 25 }
  };
  const POTION_PRICE = 30;

  // Loot-Kisten: Beute-Bündel auf der Karte, an Spezialorten & um Bosse herum.
  const CHEST_TIERS = {
    normal: { color: 0x8a5a2b, stroke: 0x4a2f14, icon: '📦', schrott: [2, 4], zahnrad: 0.5, dampfkern: 0.06 },
    rare:   { color: 0xb8935f, stroke: 0x6b4f2a, icon: '🧰', schrott: [3, 5], zahnrad: 1.0, dampfkern: 0.30 },
    boss:   { color: 0xc9a24a, stroke: 0x7c5e10, icon: '💰', schrott: [4, 7], zahnrad: 1.0, dampfkern: 1.0 }
  };

  // ---- Ausrüstung: Charakter-System (Helm, Rüstung, Stiefel, Waffe, Gadget) ----
  const GEAR_SLOTS = {
    helmet: { name: 'Helm',    icon: '⛑️', stat: 'hp',       base: 14, unit: '+{v} Panzerung', order: 0 },
    armor:  { name: 'Rüstung', icon: '🛡️', stat: 'armor',    base: 4,  unit: '+{v} Rüstung',    order: 1 },
    weapon: { name: 'Waffe',   icon: '🔫', stat: 'damage',   base: 6,  unit: '+{v} Schaden',     order: 2 },
    gadget: { name: 'Gadget',  icon: '🔩', stat: 'firerate', base: 14, unit: '+{v} Feuerrate',   order: 3 },
    boots:  { name: 'Stiefel', icon: '🥾', stat: 'speed',    base: 18, unit: '+{v} Tempo',        order: 4 },
    plate:  { name: 'Panzerplatte', icon: '🔳', stat: 'armor', base: 3, unit: '+{v} Rüstung',    order: 5 }
  };
  // Acht Platten-/Tech-Slots (2×4-Block, Diablo-Immortal-Stil): aktuell Panzerplatten, später Tech-Upgrades
  const PLATE_SLOTS = ['plate1', 'plate2', 'plate3', 'plate4', 'plate5', 'plate6', 'plate7', 'plate8'];
  const RARITY = {
    common:    { name: 'Gewöhnlich', color: 0x9ca3af, mult: 1.0, w: 58, req: 1 },
    rare:      { name: 'Selten',     color: 0x38bdf8, mult: 1.8, w: 26, req: 3 },
    epic:      { name: 'Episch',     color: 0xa855f7, mult: 2.8, w: 12, req: 7 },
    legendary: { name: 'Legendär',   color: 0xf59e0b, mult: 4.2, w: 4,  req: 11 }
  };
  const RARITY_ORDER = ['common', 'rare', 'epic', 'legendary'];
  const GEAR_ADJ = { common: ['Rostiger', 'Abgenutzter', 'Einfacher'], rare: ['Kupferner', 'Verstärkter', 'Gehärteter'], epic: ['Dampfbetriebener', 'Alchemistischer', 'Präzisions-'], legendary: ['Titanischer', 'Legendärer', 'Iron-Rail-'] };
  // Item-Attribute: lesbare Namen + Basiswerte für gerollte Affixe (Diablo-Itemization-Motor).
  const STAT_LABEL = { damage: 'Schaden', firerate: 'Feuerrate', hp: 'Leben', armor: 'Rüstung', speed: 'Tempo', crit: 'Krit %' };
  const STAT_UNIT = { damage: '', firerate: '', hp: '', armor: '', speed: '', crit: '%' };
  const SUB_BASE = { damage: 5, firerate: 10, hp: 12, armor: 3, speed: 14, crit: 5 };
  // Welche Zusatz-Affixe pro Slot rollen können (der Haupt-Stat ergibt sich aus GEAR_SLOTS).
  const AFFIX_POOL = { weapon: ['firerate', 'crit', 'damage'], armor: ['hp', 'speed', 'armor'], helmet: ['armor', 'hp', 'crit'], gadget: ['damage', 'firerate', 'crit'], boots: ['armor', 'hp', 'speed'] };
  const SUB_POOL = AFFIX_POOL;   // (Legacy-Alias)
  // Anzahl gerollter Zusatz-Affixe je Seltenheit (zusätzlich zum Haupt-Attribut).
  const AFFIX_COUNT = { common: 0, rare: 1, epic: 2, legendary: 3 };
  // Affix-Namensteile (Manufaktur-Stempel) — Präfix je Stat, Suffix zur Würze.
  const AFFIX_PREFIX = { damage: 'Bleigefütterter', firerate: 'Doppelkessel-', crit: 'Präzisionsgefräster', hp: 'Gepanzerter', armor: 'Vernieteter', speed: 'Leichtlauf-' };
  const AFFIX_SUFFIX = ['des Grenzgängers', 'aus Rogue\'s Landing', 'vom Kessel-Friedhof', 'der Eisernen Gilde', 'des Revolverhelden'];
  // Legendäre mit BENANNTER KRAFT (Regeländerung, nicht nur Stats) — je Slot mind. eine.
  const LEGENDARIES = {
    weapon: [
      { power: 'spread11', name: 'Dolores\' letzte Trommel',    desc: 'Spezialschuss feuert 11 statt 7 Projektile.' },
      { power: 'pierce',   name: 'Iron-Rail-Durchschlag',       desc: 'Kugeln durchschlagen einen zusätzlichen Gegner.' },
      { power: 'galvcrit', name: 'Galvanische Trommel',         desc: 'Kritische Treffer lösen einen Kurzschluss (Stun) aus.' },
      { power: 'critchain', name: 'Ballistischer Rechenkern',   desc: 'Krits prallen zu einem zweiten Ziel ab.' },
      { power: 'overcharge', name: 'Golem-Faust',               desc: '+18 % Schaden auf alle Treffer.', boss: 'golem' }
    ],

    { id: 'reveal', title: 'Das Erwachen', body: 'Kolben-Jacks Hydraulik-Ramme schleuderte dich durch die Waggonwand — in einen Spiegel. In den Scherben zerfiel die Illusion aus Fleisch: darunter ein rauchender, einäugiger Stahlschädel, Zahnräder, kochendes Öl. „Wer hat mir mein Gesicht geschuldet — und mit einer Lüge bezahlt?" Du bist keine Kreatur aus Fleisch. Du bist eine Maschine — Einheit 13 des PSALM-Programms.' },
    { id: 'providence', title: 'Providence Cut', body: 'Die Wahrheit unter der Wahrheit: Du hast deine Familie nicht verloren. Du wurdest als Waffe auf dein eigenes Dorf abgefeuert. „Ich hab euch nicht verloren. Ich wurde auf euch abgefeuert." Nördlich in der Wüste liegt die verbrannte Ruine — jetzt betretbar. Geh hin, wenn du bereit bist, dich zu erinnern.' },
    { id: 'vane', title: 'Direktor Cornelius Vane', body: 'Die erste geglückte Seelen-Übertragung: ein Mann mit einem Gesicht aus Wachs, der von Menschen nur in Verwaltungsvokabular spricht. „Ich habe den Tod enteignet. Er war ein schlechter Verwalter." Unter dem Wachs — die erste Seele, die je in Stahl gegossen wurde.' },
    { id: 'q_garden', title: 'Der Garten aus Rost', body: 'Agata Dorn hält an der Smog-Linie einen Garten aus Kakteen, gepflanzt in geborstene Kessel. Ihr ältester Kaktus wächst durch das kniende Chassis von PSALM-Einheit 4 — einer Maschine, die sich weigerte, Waffe zu sein, und stattdessen Spalier wurde. „Er ist nicht tot. Er hat den Beruf gewechselt."' },
    { id: 'q_pip', title: 'Der Schutzengel', body: 'Pip, ein Waisenkind mit Zahnlücke, hat dich zu seinem Schutzengel erklärt — und weiß längst, was du bist. „Das ist nur der Kessel." — „Ja. Sag ich ja." Engel waren noch nie aus Fleisch.' },
    { id: 'q_vesper', title: 'Die Rivalin', body: 'Vesper Kane, Kopfgeldjägerin, forderte dich zum Jagd-Wettstreit — und wurde zur Verbündeten. „Wir jagen jetzt nebeneinander, Blechmann. Nicht gegeneinander. Kleiner Unterschied. Großer."' },
    { id: 'q_habakuk', title: 'Die Kirche der Fleischwerdung', body: 'Prediger Habakuk, in blankem Stahl, predigt die eine Silbe, die alles ändert: nicht ertragen — tragen. „Gesegnet sei, was rostet — denn es war draußen im Regen und ist geblieben."' },
    { id: 'q_lomax', title: 'Der blinde Projektionist', body: 'Lomax sieht nichts mehr, aber er hört am Lachen, wo alle sitzen. „Erste Reihe Mitte gehört dir. Für immer heißt für immer — ich bin blind, nicht wortbrüchig."' },
    { id: 'q_corah', title: 'Die Witwe und der Automat', body: 'Corah wäscht ihren Verlust, Tag für Tag ein Stück heller. Der Automat ihres Mannes hält den Signalposten — sein Herz aber ruht unter der Erde. „Man trägt so einen Verlust nicht — man wäscht ihn."' },
    { id: 'q_dolores', title: 'Dolores’ letzte Trommel', body: 'Dolores ging mit Donner — achtzehn nahm sie mit. Sable, ein alter Bergmann, hält ihr Andenken am Auftragsbrett. „Manche Kopfgelder zahlt man nicht — man zahlt sie zurück."' },
    { id: 'q_uhrwerk', title: 'Das Uhrwerk-Herz', body: 'Thorn der Uhrmacher hält das Messingherz seines Sohnes Oliver am Laufen. Seit du durch die Stadt gehst, tickt der Junge ruhiger. „Ein Uhrmacher glaubt nicht an Wunder, nur an Wartung. Heute glaube ich an beides."' },
    { id: 'end_rebels', title: 'Ende: Der Morgen gehört niemandem', body: 'Das Eiserne Herz steht still. Gideon verbrennt die Schuldbücher. „Kein neuer Direktor. Kein neuer Thron." Und in Rustwater steht am Tresen eine Dose Öl — aufs Haus, wie immer.' },
    { id: 'end_corp', title: 'Ende: Das geölte Getriebe', body: 'Quentin lässt Vanes Stuhl hinaustragen, beendet das PSALM-Programm, versiegelt das Archiv. „Sie waren der Letzte. Und der Beste." Die Züge fahren wieder pünktlich.' },
    { id: 'end_smugglers', title: 'Ende: Der letzte Deal', body: 'Slick hat in der Stunde des Chaos das ganze Territorium aufgekauft — und schenkt dir Providence Cut. „Nichts. Der ging aufs Haus. — Sag’s keinem."' },
    { id: 'ngplus', title: 'Der ewige Kreislauf', body: 'Du hast das Territorium einmal befreit — und beginnst von Neuem, härter als zuvor. Deine Kraft bleibt, die Wüste wird zäher. Vielleicht wählst du diesmal eine andere Fahne. Vielleicht keine.' },
    { id: 'steuerwalzen', title: 'Warum tragen sie meine Erinnerung?', body: 'Der Konzern hat dein Gedächtnis nicht gelöscht — er hat es zerstückelt und als verschlüsselte Ballast-Steuerwalzen über sein ganzes Maschinennetz verteilt. Jedes Konstrukt läuft auf einer solchen Messingwalze; in manchen steckt ein Splitter von DIR — ein Backup, das nur das Direktorat je hätte zusammensetzen sollen. Zerschlägst du ihre Maschinen, birgst du die Splitter. Du setzt dich aus der Hardware deines Feindes wieder zusammen.' },
    { id: 'familie', title: 'Die Familie Hale', body: 'Liv, seine Frau, die eine Terz zu hoch lachte. Tom, der Junge, der Züge an der Schiene hörte, bevor man sie sah. Sara, deren Größe er in den Türrahmen kerbte. Sie standen an Vanes Trasse, als der Konzern Providence Cut räumte — und Einheit 13 rollte hindurch. Jeremiah Hale hat sie nicht beschützt. Jeremiah Hale war die Waffe.' },
    { id: 'heimkehr', title: 'Heimkehr nach Providence Cut', body: 'Sechzehn Messingwalzen, jede ein Splitter seiner selbst — geborgen aus dem Blech des Konzerns, heimgebracht in die Ruine, die einmal ein Zuhause war. Unter drei Steinen liegt jetzt beieinander, was der Konzern zerstückelt hat. Kein Direktorat setzt Jeremiah Hale mehr zusammen. Er hat sich selbst begraben — und damit endlich Ruhe gefunden.' },
    { id: 'q_roan', title: 'Elias Roan, der Streckenwärter', body: 'Der einzige Zeuge, der überlebte, weil er drei Meilen die Trasse hinunter war, als es geschah. Elias richtete die drei Gräber, deren Namen er kannte und deren Gesichter der Brand ihm nahm. Er ist es, der der Maschine sagt, wessen Steine das sind: Jeremiah Hale — Frau, Junge, Mädchen, alle drei darunter. „Wenn du wirklich was von ihm in dir trägst … bring ihn heim."' },
    { id: 'kampffibel', title: 'Kampf-Fibel: Schadensarten', body: 'Jeder Gegner trägt links an der Lebensleiste einen Klassen-Chip. ▫ Eckig & stahlblau = MASCHINE: Galvanisch (⚡ Volt-Karabiner) trifft 2,5-fach und verursacht Kurzschluss; Blei (kinetisch) prallt an der Panzerung ab. ● Rund & fleischrot = ORGANISCH: Kinetisch (Blei-Karabiner) trifft 1,5-fach und lässt verbluten; Galvanisch dämpft die biologische Isolierung. Thermisch (🔥 Dampf-Brenner) verbrennt Fleisch und Leichtbau, prallt aber am schweren Goliath ab. Alchemistisch (🧪 Säure-Sprüher) zersetzt Rüstung. Über getroffenen Gegnern verrät „✷ STARK" oder „🛡 schwach", ob deine Waffe passt.' }

  function renderFlashback() {
    const s = state.flashbackSeq; if (!s) return;
    revealText.setColor(s.color).setText(s.lines[s.i]);
    revealHint.setText(s.i >= s.lines.length - 1 ? '▶ zurück' : '▶ weiter');
    [revealBg, revealText, revealHint].forEach(o => o.setVisible(true));
    layoutUI(sceneRef.scale.gameSize);
  }
  function advanceFlashback() {
    const s = state.flashbackSeq; if (!s) { closeFlashback(); return; }
    if (s.i >= s.lines.length - 1) { const cb = s.onClose; closeFlashback(); if (cb) cb(); return; }
    s.i++; renderFlashback();
  }
  function closeFlashback() {
    state.flashbackPlaying = false; state.flashbackSeq = null;

          linesPre: ['„Na, Fremder. Setz dich an die Bar."', 'Sie schiebt dir ein Glas hin: „Kaktus-Schnaps aufs Haus — den ersten geb ich jedem Neuen."', '„Pass auf dich auf da draußen. Die Wüste frisst Männer wie dich zum Frühstück."'],
          linesPost: ['Mabel starrt dich an, flucht kurz — dann lacht sie rau.', '„Hätte mir gleich auffallen müssen, dass du keinen Kater kriegst, Kleiner!"', 'Sie schiebt dir statt Schnaps eine Dose Schmieröl rüber: „Trink aus. Geht aufs Haus."'],
          quests: [
            { id: 'q_bounty', title: 'Kopfgeld: Wegelagerer', kind: 'kill', count: 8, rewardGold: 120, rewardItem: 'zahnrad', chapter: 1, advanceTo: 2,
              offerText: '„Willkommen in Rustwater, Kleiner. Erste Regel am Tresen: mach dich nützlich. Draußen machen ein paar Wegelagerer die Pfade unsicher — leg acht von dem Pack um, dann red ich weiter mit dir."',
              activeText: '„Noch nicht fertig? Durchs Tor nach Norden, in die Wüste. Da wimmelt\'s. Und komm mit heiler Kehle zurück, ich hab nur ein sauberes Glas."',
              completeText: '„Sauber gemacht, Kleiner! Hier, dein wohlverdientes Kopfgeld. Und jetzt zu Silas an der Esse — der Schmied sucht Hände, und deine sehen kräftig aus."',
              doneText: '„Silas steht drüben an der Esse. Sag ihm, Mabel schickt dich — dann brummt er nur halb so lang."' },
            { id: 'q_delve', title: 'Hinab in die Schrott-Mine', kind: 'kill', count: 10, rewardGold: 240, rewardItem: 'dampfkern', chapter: 4, advanceTo: 5,
              offerText: '„Doc hat recht, Kleiner — in der alten Schrott-Mine im Osten stimmt was nicht. Steig hinab und mach dem ein Ende. Zehn von dem, was da unten haust — dann haben wir Ruhe."',
              activeText: '„Die Mine liegt im Osten der Wüste (🕳️). Geh tiefer, wenn du dich traust. Ich lass ein Licht brennen."',
              completeText: '„Du lebst noch? Und siehst … anders aus, Kleiner. Setz dich. Das muss ich mir aus der Nähe ansehen."',
              doneText: '„Was da unten passiert ist — du bist jetzt jemand anderes. Die Gilden werden von dir hören. Und ich? Ich schenk dir trotzdem nach."' }
          ] },
        { id: 'silas', name: 'Silas „Kupferauge" Finch', short: 'Silas', tx: 8, ty: 16, color: 0x9ca3af,
          linesPre: ['Der einäugige Schmied mustert dich durch seine Kupferlinse.', '„Ich brauch seltene Erze aus den Minen, sonst wächst diese Stadt nie."', '„Bring mir was Brauchbares — dann schmied ich dir was Brauchbares."'],
          linesPost: ['„Ah. Einer von den Eisernen." Er grinst schief. „Erklärt so einiges."', '„Bring mir Spezial-Zahnräder vom Kessel-Friedhof — dann bau ich dir Chassis-Panzerplatten."'],
          quest: { id: 'q_scrap', title: 'Baumaterial: Schrott', kind: 'collect', item: 'schrott', count: 12, rewardGold: 90, rewardItem: null, chapter: 2, advanceTo: 3,
            offerText: '„Zwölf Stück Schrott, Junge. Die Wüste liegt voll davon — der Konzern wirft weg, was nicht in seine Bücher passt. Bring\'s mir, und ich zeig dir, was ehrliches Eisen aus Abfall macht."',
            activeText: '„Zähl ich falsch, oder sind das noch keine zwölf? Draußen rostet mehr Geschichte, als Rustwater Häuser hat. Geh\'s holen, bevor der Sand es begräbt."',
            completeText: '„Zwölf. Aufs Gramm. Weißt du, was ich an Schrott mag? Er lügt nicht über sein Alter. Hier, dein Lohn. Und red mal mit Doc — der ist in Sorge."',
            doneText: '„Die Palisade steht, der Amboss glüht. Rost ist bloß Eisen, das gelebt hat. Doc Aris findest du in der Mitte der Stadt."' } },
        { id: 'doc', name: 'Doktor „Doc" Aris', short: 'Doc Aris', tx: 13, ty: 13, color: 0xe5e7eb,
          linesPre: ['„Zu viele Verletzte da draußen und viel zu wenig Hände."', '„Hol mir Heilkräuter aus der Alchemistischen Oase, dann reden wir weiter."'],
          linesPost: ['„Bei dir kann ich mir das Verarzten sparen." Er klopft auf dein Stahl-Chassis.', '„Aber ich weiß, wie man so ein Ding wieder flickt. Bring mir Material."'],
          quest: { id: 'q_rats', title: 'Plage: Schrott-Ratten', kind: 'kill', count: 5, rewardGold: 70, rewardItem: 'potion', chapter: 3, advanceTo: 4,
            offerText: '„Ölfresser-Ratten in den Leitungen unter der Stadt. Sie saufen Lampenöl und nagen Balken an — dünnen Sie den Bestand aus, betrachten Sie es als Präventivmedizin. Fünf Stück."',
            activeText: '„Es quiekt noch, ich höre es bis hierher. Bildlich gesprochen. Bleiben Sie dran."',
            completeText: '„Still jetzt. Gut. Hören Sie zu: In der alten Mine im Osten geht etwas um — größer als ein paar Ratten. Sag Mabel Bescheid, sie soll dich hinschicken."',
            doneText: '„Geh zu Mabel. Und lassen Sie sich bei Gelegenheit anschauen — Sie sind der gesündeste Patient meiner Laufbahn, und genau das beunruhigt mich."' } },
        { id: 'pip', name: 'Pip', short: 'Pip', tx: 16, ty: 18, color: 0xf472b6,
          linesPre: ['Ein Waisenkind mit Zahnlücke baut dir den Weg ab. „Du bist der Blechmann, stimmt\'s?"',
            '„Ich hab\'s den anderen gesagt: Meiner ist der einzige Engel im Territorium mit Wartungsvertrag. Ich spuck auf den Lappen, und dann wird\'s Auge geputzt — STILLHALTEN musst du dabei."'],
          linesPost: ['„Das ist mein Engel. Der rostet nur, wenn er traurig ist. Also fütter ich ihn mit Witzen."',
            '„Wenn ich groß bin, werd ich auch Schutzengel. Silas sagt, dafür gibt\'s keine Lehre. Ich sag: Doch. Ich bin ja grad in einer."'],
          quest: { id: 'q_pip', title: 'Pips Schutzengel', kind: 'kill', count: 6, rewardGold: 110, rewardItem: 'potion', chapter: 1,
            offerText: '„Am Waisenhaus lungert Gesindel rum, seit das Öl knapp wird. Die Großen tun so, als wär\'s nichts. Bist du wirklich ein Engel? Dann verjag sechs von denen. Engel waren noch nie aus Fleisch — also passt du perfekt."',
            activeText: '„Noch nicht alle weg? Ich hab den Kleinen versprochen, dass mein Engel das regelt. Blamier mich nicht, Blechmann."',
            completeText: '„Sechs! Ich hab mitgezählt, vom Dach aus. Hier — mein Glücks-Zahnrad. Nein, behalt\'s. Engel brauchen Ersatzteile, das weiß doch jedes Kind."',
            doneText: '„Das ist nur der Kessel, der so zischt, hab ich den Kleinen erklärt. Ja. Sag ich ja. Ich weiß Bescheid, Blechmann. Ich sag\'s bloß nicht laut."' } },
        { id: 'thorn', name: 'Thorn, der Uhrmacher', short: 'Thorn', tx: 2, ty: 3, color: 0xca8a04,
          linesPre: ['Ein Uhrmacher justiert mit zittrigen Fingern ein Kinderherz aus Messing. Daneben tickt ein Junge namens Oliver.',
            '„Zwölf Jahre hatte ich Angst vor der falschen Stille. Seit Sie durch die Stadt gehen, tickt Oliver ruhiger. Fragen Sie mich nicht, warum."'],
          linesPost: ['„Ich hab Sie am Grab von Providence Cut gesehen — eine Maschine, die trauert. Wissen Sie, was das für Männer wie mich bedeutet? Hoffnung, mit Hemmung und Unruh."',
            'Oliver sieht zu dir hoch: „Du klickst heute tiefer als letzte Woche. Herr Vater sagt, das heißt bei Werken wie uns: Es hat sich was gesetzt."'],
          quest: { id: 'q_uhrwerk', title: 'Das Uhrwerk-Herz', kind: 'collect', item: 'zahnrad', count: 8, rewardGold: 200, rewardItem: 'potion', chapter: 1,
            offerText: '„Olivers Uhrwerk-Herz verschleißt. Ich brauche acht saubere Zahnräder — nicht vom Konzern gestanzt, ehrlich gefallene. Bringen Sie sie, und der Junge tickt ein Jahr länger."',
            activeText: '„Acht Zahnräder, kein Rost an den Zähnen. Oliver zählt die Tage. Wörtlich."',
            completeText: '„Sehen Sie — er läuft rund. Ein Uhrmacher glaubt nicht an Wunder, nur an Wartung. Heute glaube ich an beides. Nehmen Sie das hier, für die Straße."',
            doneText: '„Er hat heute bis vierzigtausend getickt, ohne sich zu verzählen. Ich hab\'s eingerahmt. Kommen Sie wieder — er fragt nach Ihnen."' } },
        { id: 'lomax', name: 'Lomax, der Projektionist', short: 'Lomax', tx: 19, ty: 3, color: 0x94a3b8,
          linesPre: ['Ein blinder Mann baut einen Projektor auf, das Gesicht zur unsichtbaren Leinwand. „Erste Reihe, Mitte, ist frei, Junge. Bleibt sie auch."',
            '„Ich sehe nichts mehr. Aber am Lachen höre ich, wo alle sitzen. Und ich höre, dass du dich anders bewegst als Fleisch."'],
          linesPost: ['„Ich war Vorführer in Providence Cut, Junge. Das Letzte, was diese Augen je sahen, war ein glänzendes Chassis, das aus einem Konzernzug stieg. Dann kam das Feuer. Dann kam das Dunkel."',
            '„Nimm\'s mir nicht übel, dass ich dich nicht hasse. Ich hab die Nummer gesehen, die sie dir eintätowierten. Und ich hab gesehen, wie du am Grab standest. Nur eins von beiden war deine Schuld."'],
          quest: { id: 'q_lomax', title: 'Der blinde Projektionist', kind: 'kill', count: 8, rewardGold: 150, rewardItem: 'zahnrad', chapter: 1,
            offerText: '„Banditen haben meine Filmrollen — das Einzige, was ich noch ‚sehe\'. Darunter eine, bei der das Publikum totenstill wird: Providence Cut, an einem Morgen davor. Acht von dem Pack lungern an der Wüstenstraße. Hol sie mir vom Hals."',
            activeText: '„Noch keine Ruhe da draußen? Das Publikum wartet. Ich auch — ich brauch das Lachen, um zu wissen, wo alle sind."',
            completeText: '„Da sind sie. Ich kurbel dir eine: hörst du die Kurbel stocken? Da lacht eine Frau. Liv hieß sie — eine Terz zu hoch, und keinem hat\'s was ausgemacht." Dein Okular glüht. Er sieht es nicht. Er weiß es trotzdem.',
            doneText: '„Erste Reihe Mitte gehört dir. Manche Bilder gehören keinem Publikum mehr — nur noch einem. Für immer heißt für immer. Ich bin blind, nicht wortbrüchig."' } }
      ]
    },

    fort_freedom: {
      name: 'Fort Freedom', cols: 18, rows: 18, enemies: false, walled: true, minimap: 'full',
      floorA: 0x8a6a4a, floorB: 0x7a5a3a, grid: 0x5a4128, mini: 0x8a6a4a, bg: 0x1c140c,
      portals: [ { tx: 9, ty: 0, to: 'overworld', spawn: { c: 14, r: 28 }, short: 'Tor', label: '🚪  Wüste', mini: 0x38bdf8 } ],
      stations: [ { id: 'st_fort', tx: 9, ty: 9, name: 'Fort Freedom' } ],
      decor: [ { tx: 5, ty: 6, w: 64, h: 42, color: 0x5c4632, label: 'HÄNDLER' }, { tx: 13, ty: 12, w: 60, h: 40, color: 0x6b4f2a, label: 'FUNK' }, { tx: 13, ty: 6, w: 52, h: 38, color: 0x6d4b2f, label: 'TRUHE' } ],
      shops: [ { id: 'store', tx: 5, ty: 6 }, { id: 'stash', tx: 13, ty: 6 } ],
      npcs: [ { id: 'gideon', name: 'Gideon Cross', short: 'Gideon', tx: 12, ty: 8, color: 0x9a3b2f, guild: 'rebels',
        linesPre: ['Ein narbiger Mann mit kaltem Blick mustert dich.', '„Neu hier? Wir brechen das Monopol des Konzerns — oder sterben beim Versuch."'],
        linesPost: ['„Ein wandelnder Stahlkessel. Genau sowas brauchen wir gegen die Iron Rail."'],
        joinText: '„Kämpf für die Freiheit der Arbeiter. Trittst du der Rebellengilde bei?"',
        quests: [
          { id: 'q_rebels5', title: 'Sand im Getriebe', kind: 'kill', count: 12, rewardGold: 250, rewardItem: 'dampfkern', chapter: 5, advanceTo: 8,
            offerText: '„Sabotier die Konzern-Patrouillen — leg 12 ihrer Schergen um, dann stockt ihre Kriegsmaschine."',
            activeText: '„Die Patrouillen rollen noch. Mach weiter."',
            completeText: '„Sand im Getriebe. Perfekt. Hier, dein Anteil."',
            doneText: '„Die Ölpipeline brennt. Gut gemacht, Genosse."' },
          { id: 'q_rebels8', title: 'Der Kinetoskop-Betrug', kind: 'kill', count: 18, rewardGold: 500, rewardItem: 'dampfkern', chapter: 8, advanceTo: 10,
            offerText: '„Die Iron Rail sendet gefälschte Kinetoskop-Botschaften — angebliche Grüße deiner „Familie". Zerlege 18 ihrer Projektoren-Wächter, dann zeig ich dir die Wahrheit."',
            activeText: '„Die Projektoren laufen noch. Reiß sie nieder."',
            completeText: '„Sieh selbst: Deine Familie ist seit Jahren tot. Alles nur flackernde Bilder, um dich gefügig zu halten. Tut mir leid, Freund."',
            doneText: '„Jetzt kämpfst du für die Wahrheit — nicht für eine Lüge."' },
          { id: 'q_rebels10', title: 'Sprengt die Trasse', kind: 'kill', count: 20, rewardGold: 750, rewardItem: 'dampfkern', chapter: 10, advanceTo: 12,
            offerText: '„Drei Ziele: Pipeline, Relaisfeld, Waffenlager. Wir sprengen alle drei. Keine Reden, keine Fahnen — Fracht hinbringen, Feuer sehen, heimkommen. Leg 20 ihrer Wachen um. Fragen?"',
            activeText: '„Die Pipeline brennt noch nicht. Ich seh\'s vom Wall aus. Beweg dich, Maschine — die Nacht ist kurz, und der Konzern zählt schnell."',
            completeText: '„Rauch über drei Sektoren. Gut. Der Konzern verliert kein Blut — er verliert Takt. Und ohne Takt marschiert keine Armee. Die nächste Fracht wartet schon."',
            doneText: '„Die Trasse ist tot: kein Nachschub, keine Ernter, keine Ausreden. Wenn du Ruhe suchst — auf dem Wall ist Platz."' },
          { id: 'q_rebels12', title: 'Sturm auf die Iron Rail', kind: 'kill', count: 30, rewardGold: 1200, rewardItem: 'dampfkern', chapter: 12,
            offerText: '„Das Finale. Stürm die Zentrale der Iron Rail und leg 30 ihrer Elite-Chassis um. Für die Freiheit — ein für alle Mal."',
            activeText: '„Die Zentrale steht noch. Weiter!"',
            completeText: '„Das Monopol ist gefallen. Die Arbeiter sind frei — dank dir, Genosse."',
            doneText: '„Ein neuer Anfang für Rustwater. Ohne Ketten."' } ] },
        { id: 'corah', name: 'Corah, die Witwe', short: 'Corah', tx: 4, ty: 13, color: 0xcbd5e1,
          linesPre: ['Eine Witwe hängt Wäsche vor dem Wall. „Ich wasche jetzt auch für Fort Freedom. Doppelte Arbeit, halbe Grübelei."',
            '„Am Signalposten steht ein Automat. Er zieht keine Mütze. Ich hab extra hingesehen. Gut so — einmal Abschied reicht für ein Leben."'],
          linesPost: ['„Sie waren sanft mit ihm, hat man mir erzählt. Merken Sie sich das von sich selbst, falls mal wer sagt, in Ihnen wär nur Blech."'],
          quest: { id: 'q_corah', title: 'Die Witwe und der Automat', kind: 'collect', item: 'schrott', count: 10, rewardGold: 130, rewardItem: 'potion', chapter: 1,
            offerText: '„Der Automat meines Mannes hält den Signalposten — aber er rostet. Zehn Hände Schrott, dann flick ich sein Gehäuse. Nicht sein Herz. Das Herz ist unter der Erde, wo\'s hingehört."',
            activeText: '„Zehn Stück Schrott. Die Hände wissen am besten, wie Weiterleben geht. Bring, was du findest."',
            completeText: '„Er steht wieder gerade. Danke. Man trägt so einen Verlust nicht — man wäscht ihn. Jeden Tag ein Stück heller."',
            doneText: '„Der Posten ist besetzt, die Wäsche weiß. Zwei Sachen, auf die in diesem Fort Verlass ist. Drei, mit Ihnen."' } },
        { id: 'sable', name: 'Sable, alter Bergmann', short: 'Sable', tx: 14, ty: 4, color: 0x78716c,
          linesPre: ['Ein alter Bergmann hält ein Taschentuch mit einer Zündschnur als Schleife. „Du kanntest Dolores nicht. Schade. Sie ging mit Donner."',
            '„Die Bande, die sie in die Enge trieb, feiert noch. Das gehört sich nicht."'],
          linesPost: ['„Auf der Kiste mit den Wintersachen fürs Waisenhaus war \'ne Zündschnur als Schleife. Wir wissen schon, wer. Wir sagen\'s bloß nicht laut."'],
          quest: { id: 'q_dolores', title: 'Dolores\' letzte Trommel', kind: 'kill', count: 18, rewardGold: 400, rewardItem: 'dampfkern', chapter: 1,
            offerText: '„Dolores\' letzte Trommel hat achtzehn von denen mitgenommen. Achtzehn stehen noch. Gleich ihr die Rechnung aus. Manche Kopfgelder zahlt man nicht — man zahlt sie zurück."',
            activeText: '„Noch nicht alle. Dolores hätte längst nachgeladen. Mach weiter."',
            completeText: '„Achtzehn. Jetzt sind wir quitt, und Dolores lächelt irgendwo im Pulverdampf. Nimm ihren Ersatz-Dampfkern — sie hätt\'s so gewollt."',
            doneText: '„Der Zettel bleibt am Brett. Nicht als Auftrag. Als Andenken. Drei Worte in der Zeitung: ‚Sie ging mit Donner.\' Mehr braucht Ehrlichkeit nicht."' } } ]
    },
    sektor01: {
      name: 'Sektor 01', cols: 18, rows: 18, enemies: false, walled: true, minimap: 'full',

      shops: [ { id: 'store', tx: 5, ty: 6 }, { id: 'stash', tx: 13, ty: 6 } ],
      npcs: [ { id: 'quentin', name: 'Aufseher Quentin', short: 'Quentin', tx: 12, ty: 8, color: 0x60a5fa, guild: 'corp',
        linesPre: ['Ein kalter Mann in makelloser Uniform.', '„Ordnung ist Profit. Profit ist Ordnung. Stör keins von beidem."'],
        linesPost: ['„Ein Firmen-Automat, der frei herumläuft. Faszinierend. Und nützlich."'],
        joinText: '„Dien dem Konzern. Die Eiserne Gilde belohnt Effizienz. Beitreten?"',
        quests: [
          { id: 'q_corp5', title: 'Streikbrecher', kind: 'kill', count: 12, rewardGold: 250, rewardItem: 'dampfkern', chapter: 5, advanceTo: 8,
            offerText: '„Eliminiere 12 Rebellen-Saboteure. Der Ölfluss darf nie stocken."',
            activeText: '„Es laufen noch Saboteure frei herum. Beende das."',
            completeText: '„Effizient. Der Konzern vergisst treue Werkzeuge nicht."',
            doneText: '„Die Produktion läuft ununterbrochen. Vorbildlich."' },
          { id: 'q_corp8', title: 'Archiv-Säuberung', kind: 'kill', count: 18, rewardGold: 500, rewardItem: 'dampfkern', chapter: 8, advanceTo: 10,
            offerText: '„Rebellen haben belastende Kinetoskop-Rollen gestohlen — Aufnahmen, die beweisen, dass wir deine „Familien-Botschaften" gefälscht haben. Vernichte 18 Diebe, bevor sie reden."',
            activeText: '„Die Rollen sind noch nicht sicher. Räum auf."',
            completeText: '„Ordnung wiederhergestellt. Und ja — deine Familie war ein Konstrukt aus Licht und Linse. Doch der Konzern gab dir einen Zweck. Das ist mehr wert."',
            doneText: '„Ein loyales Werkzeug kennt keine Vergangenheit, nur den Auftrag."' },
          { id: 'q_corp10', title: 'Requirierung', kind: 'kill', count: 20, rewardGold: 750, rewardItem: 'dampfkern', chapter: 10, advanceTo: 12,

        linesPost: ['„Ein unaufhaltsamer Stahlkoloss? Weißt du, was so einer auf dem Schwarzmarkt wert ist?"'],
        joinText: '„Reichtum kennt keine Fahnen. Machst du Geschäfte mit der Schmugglergilde?"',

            offerText: '„Besorg mir 3 Dampfkerne — blaues Alchemie-Öl. Nutz das Chaos, keiner merkt\'s."',
            activeText: '„Noch nicht genug Kerne. Der Markt wartet nicht ewig."',
            completeText: '„Heißes Zeug. Verkauft sich von selbst. Dein Schnitt."',
            doneText: '„Sauberes Geschäft. Man sieht sich, Freund."' },

            offerText: '„Ich hab ein Kinetoskop-Band abgefangen — zeigt, wie die Iron Rail deine tote Familie nachstellt, um dich zu lenken. Besorg mir 6 Dampfkerne, dann kriegst du die Wahrheit gratis dazu."',
            activeText: '„Noch nicht genug Kerne. Und die Wahrheit wartet."',
            completeText: '„Da hast du\'s, Freund: Deine Familie ist längst Staub. Bitteres Geschäft — aber ehrlicher als die Konzern-Märchen. Dein Schnitt."',
            doneText: '„Wissen ist die härteste Währung. Gut, dass du zahlungsfähig bist."' },
          { id: 'q_smug10', title: 'Die große Umleitung', kind: 'collect', item: 'dampfkern', count: 8, rewardGold: 900, rewardItem: null, chapter: 10, advanceTo: 12,
            offerText: '„Sprengen? Barbarei. Requirieren? Papierkram. Wir leiten UM, Freund: dieselbe Pipeline, dieselben Kerne — nur dass am Ende unsere Fässer voll sind. Besorg mir 8 Dampfkerne aus dem umgeleiteten Strom. Kein Anschlag. Ein Missverständnis."',
            activeText: '„Ventil zwei klemmt? Dafür hast du Werkzeug dabei. Deins wiegt sechs Pfund und hat \'nen Abzug. Aber leise, ja? Umleitungen leben von Diskretion."',
            completeText: '„Drei Ströme fließen in die richtige Richtung — unsere. Und das Schönste: Der Konzern sucht jetzt einen Rechenfehler. Monatelang. Auf die Buchhaltung, Freund."',
            doneText: '„Das Öl fließt, das Gold auch, und offiziell ist nie was passiert. Perfektes Verbrechen? Nein. Perfektes GESCHÄFT."' },
          { id: 'q_smug12', title: 'Der letzte Deal', kind: 'collect', item: 'dampfkern', count: 10, rewardGold: 1600, rewardItem: null, chapter: 12,
            offerText: '„Das große Ding: 10 Dampfkerne, und wir kaufen uns aus diesem ganzen Krieg raus. Weder Rebellen noch Konzern — nur wir und der Profit."',
            activeText: '„Der Deal steht noch aus. Bring die Kerne."',
            completeText: '„Reich, frei und keiner Fahne verpflichtet. So macht man das, Partner."',

        { id: 'vesper', name: 'Vesper Kane', short: 'Vesper', tx: 6, ty: 13, color: 0xf87171,
          linesPre: ['Eine Kopfgeldjägerin lädt einen Doppellauf, ohne aufzusehen. „Blechmann. Munition kaufen?"',

          linesPost: ['Sie öffnet die Hand über dem Colt und lässt sie leer. „Eine Frage, dann hast du gewonnen: Providence Cut. Hast du\'s gewusst, als du\'s getan hast?"',
            'Du: „Nein. Sie haben\'s mich hinterher wissen lassen. Als Belohnung." — Vesper: „Dann üb weiter. Für den Tag, an dem wir die erschießen, die\'s gewusst haben."'],
          quest: { id: 'q_vesper', title: 'Der zweite Lauf', kind: 'kill', count: 15, rewardGold: 320, rewardItem: 'zahnrad', chapter: 1,
            offerText: '„Ein Wettstreit, Blechmann. Ich jag nur Konzern-Maschinen, seit PSALM-Einheit 7 meinen Bruder holte — und dich hab ich vom ersten Tag als Nummer 13 erkannt. Fünfzehn Schergen. Wer mehr räumt, hat den längeren Lauf."',

  // ---- Palisade (Stockade) -----------------------------------
  function placePost(x, y) {
    const post = sceneRef.add.rectangle(x, y - 11, 8, 22, POST_COL).setStrokeStyle(1, POST_DARK).setDepth(2);
    const tip = sceneRef.add.triangle(x, y - 22, -4, 0, 0, -7, 4, 0, POST_DARK).setDepth(2);
    mapObjects.push(post, tip);
  }
  function buildWallEdges(corners, gapWorld, gapR) {
    const spacing = 22;

      const a = corners[e], b = corners[(e + 1) % corners.length];
      const n = Math.max(1, Math.round(Phaser.Math.Distance.Between(a.x, a.y, b.x, b.y) / spacing));
      let prev = null;
      for (let i = 0; i <= n; i++) {
        const x = a.x + (b.x - a.x) * i / n, y = a.y + (b.y - a.y) * i / n;
        if (gapWorld && Phaser.Math.Distance.Between(x, y, gapWorld.x, gapWorld.y) < gapR) { prev = null; continue; }  // Tor-Öffnung frei lassen
        if (i < n) placePost(x, y);
        if (prev) colliders.push({ type: 'seg', ax: prev.x, ay: prev.y, bx: x, by: y });   // solide Wand
        prev = { x, y };
      }
    }
  }
  function buildCityWall(m) {
    const c = [tileToWorld(0, 0), tileToWorld(m.cols - 1, 0), tileToWorld(m.cols - 1, m.rows - 1), tileToWorld(0, m.rows - 1)];
    const gate = m.portals[0] ? tileToWorld(m.portals[0].tx, m.portals[0].ty) : null;
    buildWallEdges(c, gate, 66);
  }
  function buildCompound(p) {
    const b = p.compound;
    const c = [tileToWorld(b.c0, b.r0), tileToWorld(b.c1, b.r0), tileToWorld(b.c1, b.r1), tileToWorld(b.c0, b.r1)];
    buildWallEdges(c, tileToWorld(p.tx, p.ty), 56);
  }

  // Backt einen Kachelbereich [c0,c1)x[r0,r1) in eine Textur und gibt ein platziertes Image zurück
  function bakeTileRange(m, c0, c1, r0, r1) {
    const pts = [tileToWorld(c0, r0), tileToWorld(c1 - 1, r0), tileToWorld(c0, r1 - 1), tileToWorld(c1 - 1, r1 - 1)];
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const p of pts) { minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x); minY = Math.min(minY, p.y); maxY = Math.max(maxY, p.y); }
    minX -= HALF_W; maxX += HALF_W; minY -= HALF_H; maxY += HALF_H;
    const offX = -minX, offY = -minY, texW = Math.max(1, Math.ceil(maxX - minX)), texH = Math.max(1, Math.ceil(maxY - minY));
    const fg = sceneRef.make.graphics({ add: false });
    const biomed = m.biomed;
    for (let c = c0; c < c1; c++) for (let r = r0; r < r1; r++) {
      const cx = (c - r) * HALF_W + offX, cy = (c + r) * HALF_H + offY;
      const b = biomed ? biomeAtTile(c, r) : m;   // Overworld: Palette je Region
      fg.fillStyle((c + r) % 2 === 0 ? b.floorA : b.floorB, 1);
      fg.beginPath(); fg.moveTo(cx, cy - HALF_H); fg.lineTo(cx + HALF_W, cy); fg.lineTo(cx, cy + HALF_H); fg.lineTo(cx - HALF_W, cy); fg.closePath(); fg.fillPath();
      fg.lineStyle(1, b.grid, 0.4); fg.strokePath();
    }
    const key = 'floor_' + (floorTexN++);
    fg.generateTexture(key, texW, texH); fg.destroy();
    const img = sceneRef.add.image(minX, minY, key).setOrigin(0, 0).setDepth(0); img._key = key;
    return img;
  }
  function bakeFloor(m) { const img = bakeTileRange(m, 0, m.cols, 0, m.rows); floorKey = img._key; mapObjects.push(img); }

  // ---- Boden-Streaming (Chunks) ------------------------------
  function clearChunks() {
    for (const k in chunks) { const img = chunks[k]; if (img._key && sceneRef.textures.exists(img._key)) sceneRef.textures.remove(img._key); img.destroy(); }
    chunks = {};
  }
  // Baekt hoechstens `budget` fehlende Chunks pro Aufruf (naechste zuerst) -> kein Frame-Ruckeln
  function streamChunks(budget) {
    const m = MAPS[state.map]; if (!m.streamed) return;
    const ccx = Math.floor(state.playerTile.c / CHUNK), ccy = Math.floor(state.playerTile.r / CHUNK);
    const need = {}, missing = [];
    for (let dx = -CHUNK_RADIUS; dx <= CHUNK_RADIUS; dx++) for (let dy = -CHUNK_RADIUS; dy <= CHUNK_RADIUS; dy++) {
      const cx = ccx + dx, cy = ccy + dy;
      if (cx < 0 || cy < 0 || cx * CHUNK >= m.cols || cy * CHUNK >= m.rows) continue;
      const k = cx + '_' + cy; need[k] = 1;
      if (!chunks[k]) missing.push({ k, cx, cy, d: dx * dx + dy * dy });
    }
    for (const k in chunks) { if (!need[k]) { const img = chunks[k]; if (img._key && sceneRef.textures.exists(img._key)) sceneRef.textures.remove(img._key); img.destroy(); delete chunks[k]; } }
    if (missing.length) {
      missing.sort((a, b) => a.d - b.d);   // naeheste fehlende zuerst (Vorausschau)
      for (let i = 0, n = Math.min(budget, missing.length); i < n; i++) {
        const mm = missing[i];
        chunks[mm.k] = bakeTileRange(m, mm.cx * CHUNK, Math.min(m.cols, (mm.cx + 1) * CHUNK), mm.cy * CHUNK, Math.min(m.rows, (mm.cy + 1) * CHUNK));
      }
    }
  }

  // ---- Kollision (Wände & Gebäude) ---------------------------
  function closestPointOnSeg(px, py, ax, ay, bx, by) {
    const dx = bx - ax, dy = by - ay, l2 = dx * dx + dy * dy;
    let t = l2 > 0 ? ((px - ax) * dx + (py - ay) * dy) / l2 : 0; t = Phaser.Math.Clamp(t, 0, 1);
    return { x: ax + t * dx, y: ay + t * dy };
  }
  function resolveCollision() {
    for (const co of colliders) {
      if (co.type === 'seg') {
        const p = closestPointOnSeg(player.x, player.y, co.ax, co.ay, co.bx, co.by);
        let dx = player.x - p.x, dy = player.y - p.y, d = Math.hypot(dx, dy);
        if (d < PLAYER_R) { if (d < 0.001) { dx = 0; dy = -1; d = 1; } const push = PLAYER_R - d; player.x += dx / d * push; player.y += dy / d * push; }
      } else {
        const nx = Phaser.Math.Clamp(player.x, co.x, co.x + co.w), ny = Phaser.Math.Clamp(player.y, co.y, co.y + co.h);
        let dx = player.x - nx, dy = player.y - ny, d = Math.hypot(dx, dy);
        if (d < PLAYER_R) {
          if (d < 0.001) {
            const toL = player.x - co.x, toR = co.x + co.w - player.x, toT = player.y - co.y, toB = co.y + co.h - player.y, mn = Math.min(toL, toR, toT, toB);
            if (mn === toL) player.x = co.x - PLAYER_R; else if (mn === toR) player.x = co.x + co.w + PLAYER_R; else if (mn === toT) player.y = co.y - PLAYER_R; else player.y = co.y + co.h + PLAYER_R;
          } else { const push = PLAYER_R - d; player.x += dx / d * push; player.y += dy / d * push; }
        }
      }
    }
  }
  // Gewichteter Gegner-Pool: nach dem Reveal treten mechanische Konzern-Konstrukte auf.
  // Gegner-Pools je Biom (Wüste = Standard). Jedes Biom hat einen eigenen Mix, der sich nach dem
  // Erwachen mechanisch verschiebt — so unterscheiden sich die Biome auch spielerisch, nicht nur optisch.
  const BIOME_ENEMY_POOLS = {
    desert:   { pre: [['outlaw', 4], ['fauna', 3], ['revolver', 2], ['konstrukt', 1]], post: [['outlaw', 3], ['fauna', 2], ['revolver', 2], ['konstrukt', 4], ['klaeffer', 3]] },
    oasis:    { pre: [['fauna', 4], ['outlaw', 3], ['revolver', 1], ['konstrukt', 1]], post: [['fauna', 4], ['klaeffer', 3], ['outlaw', 2], ['konstrukt', 2], ['revolver', 1]] },
    forest:   { pre: [['fauna', 5], ['outlaw', 2], ['revolver', 1], ['konstrukt', 1]], post: [['fauna', 4], ['klaeffer', 4], ['konstrukt', 2], ['outlaw', 1]] },
    highland: { pre: [['revolver', 3], ['outlaw', 3], ['konstrukt', 2], ['fauna', 1]], post: [['konstrukt', 5], ['klaeffer', 3], ['revolver', 2], ['outlaw', 1]] },
    salt:     { pre: [['revolver', 4], ['outlaw', 4], ['fauna', 1]],                   post: [['revolver', 3], ['outlaw', 3], ['konstrukt', 3], ['klaeffer', 1]] }
  };
  function pickEnemyType(c, r) {
    const m = MAPS[state.map];
    let biome = 'desert';
    if (m.biomed) biome = (c !== undefined ? biomeAtTile(c, r).id : (state.curBiome || 'desert'));
    const set = BIOME_ENEMY_POOLS[biome] || BIOME_ENEMY_POOLS.desert;
    const pool = state.isRevealed ? set.post : set.pre;
    let total = 0; for (const p of pool) total += p[1];
    let x = Math.random() * total;
    for (const p of pool) { if ((x -= p[1]) <= 0) return p[0]; }
    return 'outlaw';
  }
  function spawnTyped(typeKey, x, y, opts) {
    const t = ENEMY_TYPES[typeKey], col = ENEMY_COLORS[typeKey];
    const g = Array.isArray(t.gold) ? Phaser.Math.Between(t.gold[0], t.gold[1]) : t.gold;
    return addEnemy(x, y, { r: t.r, barW: t.isBoss ? 56 : (t.swarm ? 26 : 32), hp: t.hp, color: col.color, stroke: col.stroke,
      contact: t.contact, speed: t.speed, gold: g, cls: t.cls, sub: t.sub, armor: t.armor, frontImmune: t.frontImmune, ranged: t.ranged,
      isBoss: !!t.isBoss, name: (opts && opts.name) || t.name, aggro: !!(opts && opts.aggro) });
  }
  // Dungeon-Tiefe erhöht Gegner-Zähigkeit & -Dichte (Ebene 1→3).
  function curDepth(m) { return state.map === 'abyss' ? Math.max(1, state.abyssDepth || 1) : (m.depth || 1); }
  function mapHpMul(m) { let mul = 1 + (Math.max(1, curDepth(m)) - 1) * 0.5; if (state.map === 'abyss' && state.abyssMod === 'brute') mul *= 1.3; mul *= 1 + (state.ngPlus || 0) * 0.6; return mul; }   // Tiefe + Modifikator + New Game+
  function scaleEnemyHp(e, mul) { if (mul <= 1 || !e) return e; e.maxHp = Math.round(e.maxHp * mul); e.hp = e.maxHp; e.hpFill.width = e.barW; if (state.map === 'abyss' && state.abyssMod === 'swift') e.speed = Math.round(e.speed * 1.25); return e; }
  // Wiederbesiedlung: kurz nach dem Verlassen einer Karte tauchen nur wenige Gegner wieder auf,
  // nach RESPAWN_FULL_MS (3 Min Echtzeit) wieder alle. Abstieg ist immer frisch.
  function repopFactor() {
    if (state.map === 'abyss') return 1;
    const last = state.mapVisit[state.map];
    if (!last) return 1;                                   // Erstbesuch -> voll
    const dt = Date.now() - last;
    return Math.max(RESPAWN_MIN, Math.min(1, dt / RESPAWN_FULL_MS));
  }
  function scatterEnemies(m) {
    const depth = curDepth(m), mul = mapHpMul(m); let dens = 1 + (depth - 1) * 0.2;
    if (state.map === 'abyss' && state.abyssMod === 'horde') dens *= 1.5;
    const factor = repopFactor();
    const count = Math.round(Math.min(ENEMY_MAX, Math.round(m.cols * m.rows / ENEMY_PER_TILES * dens)) * factor);
    for (let i = 0; i < count; i++) {
      const c = Phaser.Math.Between(1, m.cols - 2), r = Phaser.Math.Between(1, m.rows - 2), w = tileToWorld(c, r);
      if (Phaser.Math.Distance.Between(w.x, w.y, player.x, player.y) < 220) continue;   // Startbereich frei halten
      scaleEnemyHp(spawnTyped(pickEnemyType(c, r), w.x, w.y), mul);   // Gegner-Art nach lokalem Biom
    }
    // Elite-Bosse stehen verteilt in der Karte (mit Gefolge) — ebenfalls gestaffelt wiederbesiedelt
    let elites = m.elites !== undefined ? m.elites : ELITE_PER_MAP;

  // ---- Fog of War --------------------------------------------
  function reveal(c, r) {
    const ex = state.explored[state.map];
    for (let dc = -REVEAL_R; dc <= REVEAL_R; dc++) for (let dr = -REVEAL_R; dr <= REVEAL_R; dr++) {
      if (dc * dc + dr * dr > REVEAL_R * REVEAL_R + 1) continue;
      const nc = c + dc, nr = r + dr;
      if (nc < 0 || nr < 0 || nc >= state.cols || nr >= state.rows) continue;
      const k = nc + ',' + nr; if (!ex.has(k)) { ex.add(k); miniDirty = true; }
    }
  }

  // ---- Karten-Grafik -----------------------------------------
  function drawMapGraphics(g, cell) {
    const m = MAPS[state.map], ex = state.explored[state.map];
    g.clear();
    g.fillStyle(0x11100e, 1); g.fillRect(0, 0, m.cols * cell, m.rows * cell);
    g.fillStyle(m.mini, 1);
    ex.forEach(key => { const p = key.split(','); g.fillRect(p[0] * cell, p[1] * cell, cell, cell); });
    m.portals.forEach(p => { if (!ex.has(p.tx + ',' + p.ty)) return; g.fillStyle(p.mini, 1); g.fillRect(p.tx * cell - cell * 0.4, p.ty * cell - cell * 0.4, cell * 1.8, cell * 1.8); });
    m.stations.forEach(s => { if (!state.discovered.has(s.id)) return; g.fillStyle(COL_STATION, 1); g.fillRect(s.tx * cell - cell * 0.5, s.ty * cell - cell * 0.5, cell * 2, cell * 2); });
    const px = state.playerTile.c * cell + cell / 2, py = state.playerTile.r * cell + cell / 2, pr = Math.max(cell, 2.5);
    g.fillStyle(COL_PLAYER, 1); g.fillCircle(px, py, pr);
    g.lineStyle(1.5, 0xffffff, 0.9); g.strokeCircle(px, py, pr);

  // ---- Auftragsbuch (Quest-Log) ------------------------------
  // Sammelt alle sichtbaren Quests aus allen Karten (Gilden-Quests nur bei gewählter Gilde).
  function allQuestEntries() {
    const out = [];
    for (const mid in MAPS) {
      for (const n of (MAPS[mid].npcs || [])) {
        if (n.guild && !(state.isRevealed && state.chosenGuild === n.guild)) continue;
        const list = n.quests || (n.quest ? [n.quest] : []);
        for (const q of list) {
          const st = questStateOf(q.id);
          const locked = st === 'available' && state.currentChapter < (q.chapter || 0);
          out.push({ q, npc: n.short || n.name, mapName: MAPS[mid].name, mapId: mid, tx: n.tx, ty: n.ty, st, locked, ready: st === 'active' && questComplete(q) });
        }
      }
    }
    return out;
  }
  function questLogCounts() {
    const e = allQuestEntries();
    return { ready: e.filter(x => x.ready).length, active: e.filter(x => x.st === 'active').length };
  }
  function openQuestLog() {
    if (state.travelOpen || state.fullMapOpen || state.inventoryOpen || state.storeOpen || state.workshopOpen || state.codexOpen || state.pauseOpen) return;
    state.questLogOpen = true; hideContext();
    renderQuestLog();
  }
  function closeQuestLog() { state.questLogOpen = false; qlRows.forEach(o => o.destroy()); qlRows = []; qlRowHits = [];[qlBackdrop, qlPanel, qlTitle, qlClose].forEach(o => o.setVisible(false)); }
  function renderQuestLog() {
    qlRows.forEach(o => o.destroy()); qlRows = []; qlRowHits = [];
    const all = allQuestEntries();
    // Sortierung: abgabebereit → aktiv → verfügbar → kapitel-gesperrt → erledigt
    const rank = x => x.ready ? 0 : x.st === 'active' ? 1 : (x.st === 'available' && !x.locked) ? 2 : x.locked ? 3 : 4;
    all.sort((a, b) => rank(a) - rank(b));
    const shown = all.filter(x => x.st !== 'done');            // Erledigte nur als Zähler
    const doneCount = all.length - shown.length;
    const size = sceneRef.scale.gameSize, pw = Math.min(360, size.width * 0.92), rowH = 44;
    const bodyN = Math.min(shown.length, 9);
    const ph = 64 + Math.max(1, bodyN) * (rowH + 6) + 34;
    const px = size.width / 2, py = Math.max(20, (size.height - ph) / 2);
    qlBackdrop.setSize(size.width, size.height).setPosition(0, 0).setVisible(true);
    qlPanel.setPosition(px, py).setSize(pw, ph).setVisible(true);
    qlTitle.setPosition(px, py + 14).setVisible(true);
    qlClose.setPosition(px + pw / 2 - 20, py + 16).setVisible(true);
    if (shown.length === 0) {
      qlRows.push(sceneRef.add.text(px, py + 70, 'Keine offenen Aufträge.\nSprich mit den Leuten in den Städten.', { fontFamily: 'system-ui', fontSize: '14px', color: '#cbb894', align: 'center' }).setOrigin(0.5, 0).setScrollFactor(0).setDepth(60));
    }
    shown.slice(0, bodyN).forEach((x, i) => {
      const y = py + 54 + i * (rowH + 6);
      const icon = x.ready ? '❗' : x.st === 'active' ? '⏳' : x.locked ? '🔒' : '📜';
      const col = x.ready ? 0x3f2d1a : x.st === 'active' ? 0x2a3550 : x.locked ? 0x2b2622 : 0x22331f;
      const bg = sceneRef.add.rectangle(px, y, pw - 28, rowH, col, 0.95).setStrokeStyle(2, 0xf3e9d2, 0.35).setScrollFactor(0).setDepth(59).setOrigin(0.5, 0);
      let sub;
      if (x.locked) sub = 'ab Kapitel ' + x.q.chapter + '  ·  ' + x.npc + ' (' + x.mapName + ')';
      else if (x.st === 'active') sub = (x.ready ? 'ABGABE BEREIT' : 'Fortschritt ' + questProgress(x.q)) + '  ·  ' + x.npc + ' (' + x.mapName + ')';
      else sub = 'verfügbar  ·  ' + x.npc + ' (' + x.mapName + ')';
      const t = sceneRef.add.text(px - pw / 2 + 20, y + 6, icon + '  ' + x.q.title, { fontFamily: 'system-ui', fontSize: '15px', color: '#f3e9d2', fontStyle: 'bold' }).setOrigin(0, 0).setScrollFactor(0).setDepth(60);
      const s = sceneRef.add.text(px - pw / 2 + 20, y + 25, sub, { fontFamily: 'system-ui', fontSize: '12px', color: '#cbb894' }).setOrigin(0, 0).setScrollFactor(0).setDepth(60);
      const go = sceneRef.add.text(px + pw / 2 - 22, y + rowH / 2, '➤', { fontFamily: 'system-ui', fontSize: '18px', color: '#8fd0ff' }).setOrigin(0.5).setScrollFactor(0).setDepth(60);
      qlRows.push(bg, t, s, go);
      qlRowHits.push({ x: px, y, w: pw - 28, h: rowH, mapId: x.mapId, tx: x.tx, ty: x.ty, npc: x.npc });
    });
    const foot = (shown.length > bodyN ? '+' + (shown.length - bodyN) + ' weitere  ·  ' : '') + '✅ ' + doneCount + ' erledigt  ·  ➤ hinreisen';
    qlRows.push(sceneRef.add.text(px, py + ph - 22, foot, { fontFamily: 'system-ui', fontSize: '13px', color: '#9ca684' }).setOrigin(0.5, 0).setScrollFactor(0).setDepth(60));
  }

  function refreshInventory() { if (state.inventoryOpen) renderInventory(); }
  // Zentriertes Charakter-Panel: Ausrüstung + Werte links, Grid-Inventar rechts
  function invLayout() {
    const size = sceneRef.scale.gameSize;
    const pw = Math.min(440, Math.round(size.width * 0.94));
    const ph = Math.min(size.height - 20, Math.round(size.height * 0.86));

    const leftW = Math.round(pw * 0.42), rightX = px + leftW + 10, rightW = pw - leftW - 14;
    const gap = 5, cols = 5;
    const cell = Math.floor((rightW - (cols - 1) * gap - 4) / cols);
    const filterH = 24;                    // Höhe der Filter-Reiter über dem Grid
    const gy0 = colTop + 22 + filterH;     // Grid beginnt unter Titel + Reitern
    const rows = Math.max(6, Math.floor((colBottom - gy0 + gap) / (cell + gap)));   // sichtbare Zeilen
    const rowsTotal = rows * 3;                                                       // dreifache Kapazität (scrollbar)
    const cap = cols * rowsTotal;
    const gridW = cols * cell + (cols - 1) * gap, gx0 = rightX + Math.round((rightW - gridW) / 2);
    return { size, px, py, pw, ph, headH, colTop, colBottom, leftW, rightX, rightW, gap, cols, rows, rowsTotal, cap, cell, gx0, gy0, filterH, bx: px + leftW / 2, dollTop: colTop + 4, statsTop: colTop + 246 };
  }
  // Filter-Reiter des Inventars (Tetris-Grid): schränken die Anzeige auf eine Kategorie ein.
  const INV_FILTERS = [['all', '▦', 'Alle'], ['weapon', '🔫', 'Waffen'], ['armor', '🛡️', 'Rüstung'], ['tech', '🔳', 'Tech'], ['misc', '🧪', 'Beutel']];
  function itemCat(it) {   // Kategorie eines Grid-Items für die Filter-Reiter
    if (it.kind !== 'gear') return 'misc';               // Material + Tränke = Beutel
    const s = it.gear.slot;
    if (s === 'weapon') return 'weapon';
    if (s === 'plate' || s === 'tech') return 'tech';    // Platten & Tech-Module
    return 'armor';                                       // Helm/Rüstung/Gadget/Stiefel
  }
  function gridItems(filter) {   // alles, was im Grid liegt: Gear (Fußabdruck) + Material-/Trank-Stapel (1 Slot)
    const items = [];
    for (const g of state.gearBag) items.push({ kind: 'gear', gear: g, foot: gearFoot(g) });
    for (const id of ['schrott', 'zahnrad', 'dampfkern']) if ((state.inventory[id] || 0) > 0) items.push({ kind: 'mat', id, foot: [1, 1] });
    for (const id of ['muni', 'kristall']) if (ammoOf(id) > 0) items.push({ kind: 'ammo', id, foot: [1, 1] });   // Munition = stapelbares Beutel-Item
    if (state.potions > 0) items.push({ kind: 'potion', foot: [1, 1] });
    const out = (filter && filter !== 'all') ? items.filter(it => itemCat(it) === filter) : items;   // Reiter-Filter (Kapazität zählt weiter alles: ohne Arg)
    out.sort((a, b) => (b.foot[0] * b.foot[1]) - (a.foot[0] * a.foot[1]));   // Große zuerst packen
    return out;
  }
  function filterCounts() {   // Anzahl Items je Kategorie (für die Reiter-Zähler)
    const c = { all: 0, weapon: 0, armor: 0, tech: 0, misc: 0 };
    for (const it of gridItems()) { c.all++; c[itemCat(it)]++; }
    return c;
  }
  function packItems(items, cols, rows) {   // Tetris-Packung einer beliebigen Item-Liste (Beutel wie Truhe)
    const occ = Array.from({ length: rows }, () => new Array(cols).fill(false)), placed = [];
    const fits = (x, y, w, h) => { if (x + w > cols || y + h > rows) return false; for (let j = 0; j < h; j++) for (let i = 0; i < w; i++) if (occ[y + j][x + i]) return false; return true; };
    for (const it of items) {
      const w = it.foot[0], h = it.foot[1]; let done = false;
      for (let y = 0; y < rows && !done; y++) for (let x = 0; x < cols && !done; x++) if (fits(x, y, w, h)) {
        for (let j = 0; j < h; j++) for (let i = 0; i < w; i++) occ[y + j][x + i] = true;
        placed.push({ it, gx: x, gy: y, w, h }); done = true;
      }
    }
    return placed;
  }
  function packGrid(cols, rows, filter) { return packItems(gridItems(filter), cols, rows); }
  function gridUsedCells() { let n = 0; for (const it of gridItems()) n += it.foot[0] * it.foot[1]; return n; }
  function gridFree() { return invLayout().cap - gridUsedCells(); }
  // Material stapelt in EINEN Grid-Slot: ein bestehender Stapel nimmt beliebig viel auf,
  // ein NEUER Materialtyp braucht einen freien Slot. (Anzahl ist NICHT das Limit — Plätze sind es.)
  function canTakeMat(id) { return (state.inventory[id] || 0) > 0 || gridFree() >= 1; }
  function renderInventory() {

    }
    // ---- Rechts: Grid-Inventar (scrollbar) ----
    // Packung des aktiven Filters vorab -> Scroll-Grenze richtet sich nach den belegten Zeilen.
    const packed = packGrid(L.cols, L.rowsTotal, state.invFilter);
    const usedRows = packed.reduce((m, p) => Math.max(m, p.gy + p.h), 0);
    const maxScroll = Math.max(0, usedRows - L.rows);

    add(sceneRef.add.text(L.rightX, L.colTop, (state.shopMode ? '🎒 Mein Inventar  (' : '🎒  Inventar  (') + gridUsedCells() + '/' + L.cap + ')', { fontFamily: 'system-ui', fontSize: '12px', color: '#c9a24a', fontStyle: 'bold' }).setOrigin(0, 0).setScrollFactor(0).setDepth(52));
    // ---- Filter-Reiter (Kategorien): Alle / Waffen / Rüstung / Tech / Beutel ----

    const counts = filterCounts();
    const fN = INV_FILTERS.length, fGap = 4, fH = 20, fW = Math.floor((L.rightW - (fN - 1) * fGap) / fN), fY = L.colTop + 20;
    INV_FILTERS.forEach(([id, icon, label], i) => {

      const r = add(sceneRef.add.rectangle(fx, fY, fW, fH, active ? 0x7c4a12 : 0x2a2f3a, 0.95).setStrokeStyle(1.5, active ? 0xf3e9d2 : 0x556677, 0.6).setScrollFactor(0).setDepth(52).setOrigin(0, 0));

  // Legt ein Item ab: Ausrüstung wird zu etwas Schrott recycelt, Material/Trank verworfen.

      state.inventory[pay.id] = Math.max(0, cnt - 1);   // ein Stück verwerfen

  // ---- Karten-Wechsel ----------------------------------------

  function enterAbyss(depth) {
    state.abyssDepth = depth;
    state.abyssMod = ABYSS_MODS[Phaser.Math.Between(0, ABYSS_MODS.length - 1)].id;
    const prevBiome = state.abyssBiome;
    const biome = applyAbyssBiome(depth);            // Boden/Hintergrund je Tiefenband setzen
    state.abyssBiomeNew = biome.id !== prevBiome;    // Biom-Wechsel für den Ankunfts-Ausruf merken
    state.abyssNewRecord = depth > (state.abyssBest || 0);   // Rekord-Bark vor dem Überschreiben merken
    if (state.abyssNewRecord) state.abyssBest = depth;
    save(); transitionTo('abyss', { c: 13, r: 3 });
  }
  // Tiefen-Meilenstein-Ausruf: Rekord schlägt Fünfer-Marke schlägt Held-Monolog.
  function abyssDepthBark() {
    if (state.map !== 'abyss' || !player) return;
    const d = state.abyssDepth, x = player.x, y = player.y - 26;
    if (state.abyssNewRecord && d >= 5) { sayBark(x, y, BARKS.depthRecord, '#fca5a5'); state.abyssNewRecord = false; return; }
    if (state.abyssBiomeNew) { sayBark(x, y, abyssBiomeFor(d).callout, '#c4b5fd'); state.abyssBiomeNew = false; return; }   // neues Biom betreten
    const milestone = BARKS['depth' + d];
    if (milestone) sayBark(x, y, milestone, '#c4b5fd');
    else if (Math.random() < 0.4) sayBark(x, y, pickBark(BARKS.hero_depth), '#bcd0e0');
  }
  function transitionTo(mapId, spawn) {
    if (mapId === '__abyss') { enterAbyss(1); return; }                       // Eingang aus dungeon3

    if (mapId === 'providence_cut' && !state.isRevealed) { toast('🏚️ Etwas an dieser Ruine lässt dich zögern. Noch nicht.'); return; }   // Familiensuche erst nach dem Erwachen

  // ---- Werkstatt (Upgrade-Baum, gesperrt bis Reveal) ---------
  function openWorkshop() {

    // Zeilenmodell: Körper-/Waffen-Mods + (nach Reveal) Waffen-Armaturen je freigeschalteter Waffe

    const wlist = WEAPON_ORDER.filter(weaponUnlocked);
    rows.push({ kind: 'head', label: '🔫  Waffen-Armaturen' });
    wlist.forEach(id => rows.push({ kind: 'weapon', id }));
    const rowH = 46, headH = 66, footH = 38, subH = 26;
    const bodyH = rows.reduce((s, r) => s + (r.kind === 'head' ? subH : rowH + 6), 0);
    const pw = Math.min(360, size.width * 0.94), ph = Math.min(size.height * 0.96, headH + bodyH + footH);
    const px = size.width / 2, py = (size.height - ph) / 2;
    const add = o => { wsUI.push(o); return o; };
    add(sceneRef.add.rectangle(0, 0, size.width, size.height, 0x000000, 0.72).setOrigin(0, 0).setScrollFactor(0).setDepth(50));
    wsPanelRef = add(sceneRef.add.rectangle(px, py, pw, ph, 0x11100e, 0.97).setOrigin(0.5, 0).setStrokeStyle(2, 0xc9a24a, 0.7).setScrollFactor(0).setDepth(51));

  }
  function storeButtonsPush(btn, id) { wsButtons.push({ rect: btn, id }); }
  function closeWorkshop() { state.workshopOpen = false; wsUI.forEach(o => o.destroy()); wsUI = []; wsButtons = []; wsCloseRef = null; wsPanelRef = null; }
  function buyUpgrade(id) {

      const wid = id.slice(2), lvl = weaponLvl(wid);
