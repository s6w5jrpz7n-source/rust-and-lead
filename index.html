  // ---- Palisade (Stockade) -----------------------------------
  function placePost(x, y) {
    const post = sceneRef.add.rectangle(x, y - 11, 8, 22, POST_COL).setStrokeStyle(1, POST_DARK).setDepth(2);
    const tip = sceneRef.add.triangle(x, y - 22, -4, 0, 0, -7, 4, 0, POST_DARK).setDepth(2);
    mapObjects.push(post, tip);
  }
  function buildWallEdges(corners, gapWorld, gapR) {
    const spacing = 22;
    for (let e = 0; e < corners.length; e++) {
      const a = corners[e], b = corners[(e + 1) % corners.length];
      const n = Math.max(1, Math.round(Phaser.Math.Distance.Between(a.x, a.y, b.x, b.y) / spacing));
      let prev = null;
      for (let i = 0; i <= n; i++) {
        const x = a.x + (b.x - a.x) * i / n, y = a.y + (b.y - a.y) * i / n;
        if (gapWorld && Phaser.Math.Distance.Between(x, y, gapWorld.x, gapWorld.y) < gapR) { prev = null; continue; }  // Tor-Öffnung frei lassen
        if (i < n) placePost(x, y);
        if (prev) colliders.push({ type: 'seg', ax: prev.x, ay: prev.y, bx: x, by: y });   // solide Wand
        prev = { x, y };
      }
    }
  }
  function buildCityWall(m) {
    const c = [tileToWorld(0, 0), tileToWorld(m.cols - 1, 0), tileToWorld(m.cols - 1, m.rows - 1), tileToWorld(0, m.rows - 1)];
    const gate = m.portals[0] ? tileToWorld(m.portals[0].tx, m.portals[0].ty) : null;
    buildWallEdges(c, gate, 66);
  }
  function buildCompound(p) {
    const b = p.compound;
    const c = [tileToWorld(b.c0, b.r0), tileToWorld(b.c1, b.r0), tileToWorld(b.c1, b.r1), tileToWorld(b.c0, b.r1)];
    buildWallEdges(c, tileToWorld(p.tx, p.ty), 56);
  }

  // Backt einen Kachelbereich [c0,c1)x[r0,r1) in eine Textur und gibt ein platziertes Image zurück
  function bakeTileRange(m, c0, c1, r0, r1) {
    const pts = [tileToWorld(c0, r0), tileToWorld(c1 - 1, r0), tileToWorld(c0, r1 - 1), tileToWorld(c1 - 1, r1 - 1)];
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const p of pts) { minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x); minY = Math.min(minY, p.y); maxY = Math.max(maxY, p.y); }
    minX -= HALF_W; maxX += HALF_W; minY -= HALF_H; maxY += HALF_H;
    const offX = -minX, offY = -minY, texW = Math.max(1, Math.ceil(maxX - minX)), texH = Math.max(1, Math.ceil(maxY - minY));
    const fg = sceneRef.make.graphics({ add: false });
    for (let c = c0; c < c1; c++) for (let r = r0; r < r1; r++) {
      const cx = (c - r) * HALF_W + offX, cy = (c + r) * HALF_H + offY;
      fg.fillStyle((c + r) % 2 === 0 ? m.floorA : m.floorB, 1);
      fg.beginPath(); fg.moveTo(cx, cy - HALF_H); fg.lineTo(cx + HALF_W, cy); fg.lineTo(cx, cy + HALF_H); fg.lineTo(cx - HALF_W, cy); fg.closePath(); fg.fillPath();
      fg.lineStyle(1, m.grid, 0.4); fg.strokePath();
    }
    const key = 'floor_' + (floorTexN++);
    fg.generateTexture(key, texW, texH); fg.destroy();
    const img = sceneRef.add.image(minX, minY, key).setOrigin(0, 0).setDepth(0); img._key = key;
    return img;
  }
  function bakeFloor(m) { const img = bakeTileRange(m, 0, m.cols, 0, m.rows); floorKey = img._key; mapObjects.push(img); }

  // ---- Boden-Streaming (Chunks) ------------------------------
  function clearChunks() {
    for (const k in chunks) { const img = chunks[k]; if (img._key && sceneRef.textures.exists(img._key)) sceneRef.textures.remove(img._key); img.destroy(); }
    chunks = {};
  }
  // Baekt hoechstens `budget` fehlende Chunks pro Aufruf (naechste zuerst) -> kein Frame-Ruckeln
  function streamChunks(budget) {
    const m = MAPS[state.map]; if (!m.streamed) return;
    const ccx = Math.floor(state.playerTile.c / CHUNK), ccy = Math.floor(state.playerTile.r / CHUNK);
    const need = {}, missing = [];
    for (let dx = -CHUNK_RADIUS; dx <= CHUNK_RADIUS; dx++) for (let dy = -CHUNK_RADIUS; dy <= CHUNK_RADIUS; dy++) {
      const cx = ccx + dx, cy = ccy + dy;
      if (cx < 0 || cy < 0 || cx * CHUNK >= m.cols || cy * CHUNK >= m.rows) continue;
      const k = cx + '_' + cy; need[k] = 1;
      if (!chunks[k]) missing.push({ k, cx, cy, d: dx * dx + dy * dy });
    }
    for (const k in chunks) { if (!need[k]) { const img = chunks[k]; if (img._key && sceneRef.textures.exists(img._key)) sceneRef.textures.remove(img._key); img.destroy(); delete chunks[k]; } }
    if (missing.length) {
      missing.sort((a, b) => a.d - b.d);   // naeheste fehlende zuerst (Vorausschau)
      for (let i = 0, n = Math.min(budget, missing.length); i < n; i++) {
        const mm = missing[i];
        chunks[mm.k] = bakeTileRange(m, mm.cx * CHUNK, Math.min(m.cols, (mm.cx + 1) * CHUNK), mm.cy * CHUNK, Math.min(m.rows, (mm.cy + 1) * CHUNK));
      }
    }
  }

  // ---- Kollision (Wände & Gebäude) ---------------------------
  function closestPointOnSeg(px, py, ax, ay, bx, by) {

    let t = l2 > 0 ? ((px - ax) * dx + (py - ay) * dy) / l2 : 0; t = Phaser.Math.Clamp(t, 0, 1);
    return { x: ax + t * dx, y: ay + t * dy };
  }
  function resolveCollision() {
    for (const co of colliders) {
      if (co.type === 'seg') {
        const p = closestPointOnSeg(player.x, player.y, co.ax, co.ay, co.bx, co.by);
        let dx = player.x - p.x, dy = player.y - p.y, d = Math.hypot(dx, dy);
        if (d < PLAYER_R) { if (d < 0.001) { dx = 0; dy = -1; d = 1; } const push = PLAYER_R - d; player.x += dx / d * push; player.y += dy / d * push; }

        let dx = player.x - nx, dy = player.y - ny, d = Math.hypot(dx, dy);

            const toL = player.x - co.x, toR = co.x + co.w - player.x, toT = player.y - co.y, toB = co.y + co.h - player.y, mn = Math.min(toL, toR, toT, toB);

  }
  // Gewichteter Gegner-Pool: nach dem Reveal treten mechanische Konzern-Konstrukte auf.
  function pickEnemyType() {
    const pool = state.isRevealed

      : [['outlaw', 4], ['fauna', 3], ['revolver', 2], ['konstrukt', 1]];
    let total = 0; for (const p of pool) total += p[1];
    let x = Math.random() * total;
    for (const p of pool) { if ((x -= p[1]) <= 0) return p[0]; }
    return 'outlaw';
  }
  function spawnTyped(typeKey, x, y, opts) {

    const g = Array.isArray(t.gold) ? Phaser.Math.Between(t.gold[0], t.gold[1]) : t.gold;
    return addEnemy(x, y, { r: t.r, barW: t.isBoss ? 56 : (t.sub === 'fauna' ? 26 : 32), hp: t.hp, color: col.color, stroke: col.stroke,
      contact: t.contact, speed: t.speed, gold: g, cls: t.cls, sub: t.sub, armor: t.armor, frontImmune: t.frontImmune, ranged: t.ranged,

  // Dungeon-Tiefe erhöht Gegner-Zähigkeit & -Dichte (Ebene 1→3).
  function curDepth(m) { return state.map === 'abyss' ? Math.max(1, state.abyssDepth || 1) : (m.depth || 1); }
  function mapHpMul(m) { let mul = 1 + (Math.max(1, curDepth(m)) - 1) * 0.5; if (state.map === 'abyss' && state.abyssMod === 'brute') mul *= 1.3; return mul; }   // Tiefe + Modifikator

  function scatterEnemies(m) {

  }

  // ---- Fog of War --------------------------------------------
  function reveal(c, r) {
    const ex = state.explored[state.map];
    for (let dc = -REVEAL_R; dc <= REVEAL_R; dc++) for (let dr = -REVEAL_R; dr <= REVEAL_R; dr++) {

    }
  }

    m.portals.forEach(p => { if (!ex.has(p.tx + ',' + p.ty)) return; g.fillStyle(p.mini, 1); g.fillRect(p.tx * cell - cell * 0.4, p.ty * cell - cell * 0.4, cell * 1.8, cell * 1.8); });

  function refreshInventory() { if (state.inventoryOpen) renderInventory(); }
  // Zentriertes Charakter-Panel: Ausrüstung + Werte links, Grid-Inventar rechts

  function packGrid(cols, rows) {
    const occ = Array.from({ length: rows }, () => new Array(cols).fill(false)), placed = [];
    const fits = (x, y, w, h) => { if (x + w > cols || y + h > rows) return false; for (let j = 0; j < h; j++) for (let i = 0; i < w; i++) if (occ[y + j][x + i]) return false; return true; };
    for (const it of gridItems()) {
      const w = it.foot[0], h = it.foot[1]; let done = false;
      for (let y = 0; y < rows && !done; y++) for (let x = 0; x < cols && !done; x++) if (fits(x, y, w, h)) {
        for (let j = 0; j < h; j++) for (let i = 0; i < w; i++) occ[y + j][x + i] = true;
        placed.push({ it, gx: x, gy: y, w, h }); done = true;
      }
    }
    return placed;
  }

    wlist.forEach(id => rows.push({ kind: 'weapon', id }));

  function storeButtonsPush(btn, id) { wsButtons.push({ rect: btn, id }); }
  function closeWorkshop() { state.workshopOpen = false; wsUI.forEach(o => o.destroy()); wsUI = []; wsButtons = []; wsCloseRef = null; wsPanelRef = null; }
  function buyUpgrade(id) {

  // ---- NPC-Dialog (mit Anti-Doppeltipp) ----------------------
  function openDialogue(def) {
    if (state.dialogueOpen) return;                 // Anti-Doppeltipp
    state.dialogueOpen = true;
    const lines = (state.isRevealed ? def.linesPost : def.linesPre) || def.linesPre;
    state.dlg = { def, lines, i: 0 };
    hideContext(); renderDialogue();
  }
  function renderDialogue() {
    const d = state.dlg; if (!d) return;
    const q = currentQuestOf(d.def), flavorN = d.lines.length;
    const hasPage = !!d.def.guild || !!q;
    dlgName.setText(d.def.name); hideDlgBtn();
    if (d.i < flavorN) {
      dlgText.setText(d.lines[d.i]);
      dlgHint.setText((d.i === flavorN - 1 && !hasPage) ? '▶ Schließen' : '▶ Weiter');
    } else {   // Quest-Seite (bei Gilden-NPCs erst nach Beitritt)
      if (d.def.guild && !guildQuestUnlocked(d.def)) renderGuildGate(d.def);
      else if (q) renderQuestPage(q);
      else { dlgText.setText('„Im Moment hab ich nichts für dich. Komm später wieder."'); dlgHint.setText('▶ Schließen'); }
    }
    [dlgBg, dlgName, dlgText, dlgHint].forEach(o => o.setVisible(true));
    layoutUI(sceneRef.scale.gameSize);
  }
  // Aktuelle anzuzeigende Quest eines NPC (Einzel-Quest ODER Ketten-Quest nach Kapitel).
  function currentQuestOf(def) {
    const list = def.quests || (def.quest ? [def.quest] : []);
    let last = null;
    for (const q of list) {
      if (questStateOf(q.id) === 'done') { last = q; continue; }
      if (state.currentChapter >= (q.chapter || 0)) return q;   // freigeschaltet
      return last;   // nächste Quest noch kapitel-gesperrt → letzte erledigte zeigen
    }
    return last;   // alle erledigt → letzte Quest (zeigt doneText)
  }
  function renderQuestPage(q) {
    const st = questStateOf(q.id);
    if (st === 'available') { dlgText.setText(q.offerText + '\n\nBelohnung: ' + rewardStr(q)); showDlgBtn('📜 Auftrag annehmen', () => acceptQuest(q)); dlgHint.setText('▶ ablehnen'); }
    else if (st === 'active') {
      if (questComplete(q)) { dlgText.setText(q.completeText + '\n\nBelohnung: ' + rewardStr(q)); showDlgBtn('✅ Abgeben', () => turnInQuest(q)); dlgHint.setText(''); }
      else { dlgText.setText(q.activeText + '\n\nFortschritt: ' + questProgress(q)); dlgHint.setText('▶ Schließen'); }
    } else { dlgText.setText(q.doneText); dlgHint.setText('▶ Schließen'); }
  }
  function guildQuestUnlocked(def) { return state.isRevealed && state.chosenGuild === def.guild; }
  function renderGuildGate(def) {
    const g = def.guild;
    if (!state.isRevealed) { dlgText.setText('Der Botschafter mustert dich lange. „Komm wieder, wenn du weißt, wer — oder was — du bist."'); dlgHint.setText('▶ Schließen'); }
    else if (state.chosenGuild && state.chosenGuild !== g) { dlgText.setText('„Du trägst schon die Farben einer anderen Gilde. Verschwinde."'); dlgHint.setText('▶ Schließen'); }
    else { dlgText.setText(def.joinText || ('Schließ dich an: ' + GUILDS[g].name)); showDlgBtn('🤝 ' + GUILDS[g].name + ' beitreten', () => joinGuild(g)); dlgHint.setText('▶ später'); }
  }
  function joinGuild(g) { state.chosenGuild = g; toast('🤝 Beigetreten: ' + GUILDS[g].name); save(); updateNpcIndicators(); renderDialogue(); }
  function advanceDialogue() {
    const d = state.dlg; if (!d) { closeDialogue(); return; }
    const hasPage = !!d.def.guild || !!currentQuestOf(d.def);
    const total = d.lines.length + (hasPage ? 1 : 0);
    if (d.i >= total - 1) { closeDialogue(); return; }
    d.i++; renderDialogue();
  }
  function closeDialogue() {
    state.dialogueOpen = false; state.dlg = null; hideDlgBtn();
    [dlgBg, dlgName, dlgText, dlgHint].forEach(o => o.setVisible(false));
  }
  function showDlgBtn(txt, action) { dlgBtnText.setText(txt); dlgBtnAction = action; dlgBtn.setVisible(true); dlgBtnText.setVisible(true); }
  function hideDlgBtn() { dlgBtnAction = null; if (dlgBtn) dlgBtn.setVisible(false); if (dlgBtnText) dlgBtnText.setVisible(false); }

  // ---- Quests -------------------------------------------------
  function questStateOf(id) { return state.quests[id] || 'available'; }
  function questComplete(q) {
    if (q.kind === 'kill') return (kills - (state.questBase[q.id] || 0)) >= q.count;
    if (q.kind === 'collect') return (state.inventory[q.item] || 0) >= q.count;
    return false;
  }
  function questProgress(q) {
    if (q.kind === 'kill') return Math.min(kills - (state.questBase[q.id] || 0), q.count) + '/' + q.count;
    if (q.kind === 'collect') return Math.min(state.inventory[q.item] || 0, q.count) + '/' + q.count + ' ' + ITEMS[q.item].icon;
    return '';
  }
  function rewardItemName(id) { return id === 'potion' ? ('🍶 ' + T('potion')) : (ITEMS[id] ? ITEMS[id].icon + ' ' + ITEMS[id].name : ''); }
  function rewardStr(q) { return q.rewardGold + ' 💰' + (q.rewardItem ? ' + ' + rewardItemName(q.rewardItem) : ''); }
  function acceptQuest(q) {
    state.quests[q.id] = 'active';
    if (q.kind === 'kill') state.questBase[q.id] = kills;
    toast('📜 Auftrag angenommen: ' + q.title); save(); updateNpcIndicators(); closeDialogue();
  }
  function turnInQuest(q) {
    if (!questComplete(q)) return;
    state.gold += q.rewardGold; updateGold();
    if (q.kind === 'collect') state.inventory[q.item] = (state.inventory[q.item] || 0) - q.count;
    if (q.rewardItem === 'potion') { state.potions++; updateAbilityUI(); }
    else if (q.rewardItem && ITEMS[q.rewardItem]) state.inventory[q.rewardItem] = (state.inventory[q.rewardItem] || 0) + 1;
    state.quests[q.id] = 'done';
    if (q.advanceTo && q.advanceTo > state.currentChapter) { state.currentChapter = q.advanceTo; toast('📖 Kapitel ' + q.advanceTo); }
    const xpGain = Math.max(25, Math.round(q.rewardGold * 0.5));
    toast('✅ ' + q.title + ' erledigt! +' + q.rewardGold + ' Gold · +' + xpGain + ' XP'); gainXp(xpGain); save(); updateNpcIndicators(); closeDialogue();
  }
  function updateNpcIndicators() {
    for (const n of npcSprites) {
      if (!n.gear) continue;
      if (n.def.guild && !guildQuestUnlocked(n.def)) {   // Gilden-NPC: nur Beitritts-Marker
        const g = n.def.guild;
        if (state.isRevealed && (!state.chosenGuild || state.chosenGuild === g)) { n.gear.setVisible(true); n.gear.setText('🤝'); }
        else n.gear.setVisible(false);
        continue;
      }
      const q = currentQuestOf(n.def);
      const st = q ? questStateOf(q.id) : 'done';
      if (!q || st === 'done') n.gear.setVisible(false);
      else { n.gear.setVisible(true); n.gear.setText(st === 'available' ? '⚙️' : (questComplete(q) ? '❗' : '⏳')); }
    }
  }
  function updateQuestTracker() {
    if (!questText) return;
    let s = '';
    if (state.bounty) {
      if (state.bounty.done) s = '🎯 Kopfgeld fällig: „' + state.bounty.name + '" — im Saloon abholen';
      else { const tgt = enemies.find(e => e.bountyTarget); s = tgt ? ('🎯 Kopfgeld: „' + state.bounty.name + '" — ' + Math.round(Phaser.Math.Distance.Between(player.x, player.y, tgt.c.x, tgt.c.y)) + ' entfernt') : ('🎯 Kopfgeld: „' + state.bounty.name + '" — in der Wüste jagen'); }
    }
    if (!s) for (const n of npcSprites) { const q = currentQuestOf(n.def); if (q && questStateOf(q.id) === 'active') { s = '📜 ' + q.title + '  ' + questProgress(q); break; } }
    // auch außerhalb der Stadt: erste aktive Quest global finden
    if (!s) for (const id in state.quests) if (state.quests[id] === 'active') { const q = findQuest(id); if (q) { s = '📜 ' + q.title + '  ' + questProgress(q); break; } }
    if (questText.text !== s) questText.setText(s);
  }
  function findQuest(id) {
    for (const mid in MAPS) for (const n of (MAPS[mid].npcs || [])) {
      const list = n.quests || (n.quest ? [n.quest] : []);
      for (const q of list) if (q.id === id) return q;
    }
    return null;
  }

  // ---- Reveal-Event (Ende Kapitel 4) -------------------------

    if (state.isRevealed || state.revealPlaying) return;

    state.revealPlaying = true; hideContext();

    sceneRef.cameras.main.flash(400, 255, 60, 30);

  }
  function renderReveal() {
    const s = state.revealSeq; if (!s) return;
    revealText.setText(REVEAL_LINES[s.i]);
    revealHint.setText(s.i >= REVEAL_LINES.length - 1 ? '▶ erwachen' : '▶ weiter');
    [revealBg, revealText, revealHint].forEach(o => o.setVisible(true));
    layoutUI(sceneRef.scale.gameSize);
  }
  function advanceReveal() {
    const s = state.revealSeq; if (!s) { closeReveal(); return; }

    s.i++; renderReveal();

  function closeReveal() { state.revealPlaying = false; state.revealSeq = null; [revealBg, revealText, revealHint].forEach(o => o.setVisible(false)); }
  function applyRevealVisual() {
    if (player && player.body) { player.body.setFillStyle(0x6b7280); player.body.setStrokeStyle(3, 0x374151); }
    if (player && player.nose) { player.nose.setFillStyle(0xff5a1f); player.nose.setStrokeStyle(2, 0x7c2d12); }
    if (portraitIcon) { portraitIcon.setFillStyle(0x6b7280); portraitIcon.setStrokeStyle(3, 0x374151); }
    if (lifeBarFill) lifeBarFill.setFillStyle(0xd97706);          // Kupfer/Öl statt biologischem Grün
    if (portraitBg) portraitBg.setStrokeStyle(2, 0xc2703a, 0.85);
  }
  function applyReveal() {
    state.isRevealed = true; state.currentChapter = 5;

    toast('⚙ Das Interface mutiert. Du bist erwacht.');
    toast('🔧 Neue Armaturen: Volt-Karabiner, Säure-Sprüher, Dampf-Brenner');
  }

  // ---- Store: als Charakter-Panel im Shop-Modus (links Händler, rechts Inventar) ----
  function gearValue(g) { let a = 0; if (g.affixes) for (const x of g.affixes) a += x.val; if (g.sub) a += g.sub.val; return Math.round(RARITY[g.rarity].mult * 15 + g.stat.val + a * 0.8 + (g.legendaryPower ? 60 : 0)); }
  function openStore() {
    if (state.travelOpen || state.fullMapOpen) return;
    hideContext(); merchantStock();
    state.storeOpen = true; state.inventoryOpen = true; state.shopMode = true; invScroll = 0;
    renderInventory();
  }
  function closeStore() { state.storeOpen = false; state.shopMode = false; closeInventory(); }
  function refreshStore() { if (state.inventoryOpen) renderInventory(); }
  function buyPotion() {
    if (state.gold < POTION_PRICE) { toast('Nicht genug Gold'); return; }
    state.gold -= POTION_PRICE; state.potions++; updateGold(); updateAbilityUI();
    toast('🍶 ' + T('potion') + ' gekauft'); save(); refreshStore();
  }
  function buyAmmo(kind) {
    const a = AMMO[kind]; if (!a) return;
    if (ammoOf(kind) >= ammoCap(kind)) { toast(a.icon + ' Vorrat voll'); return; }
    if (state.gold < a.price) { toast('Nicht genug Gold'); return; }
    state.gold -= a.price; addAmmo(kind, a.pack); updateGold(); updateWeaponUI();
    toast(a.icon + ' +' + a.pack + ' ' + a.name); save(); refreshStore();
  }
  // Händler-Warenlager: pro Basis ein kleines Angebot an Ausrüstung zum Kaufen.
  // Preis = Verkaufswert × Aufschlag (Kauf teurer als Verkauf). Bias hebt bessere Qualität.
  const MERCHANT_BUY_MULT = 4, MERCHANT_STOCK = 3;
  function merchantBias(mapId) { return ({ fort_freedom: 0.4, sektor01: 0.6, rogues_landing: 0.9, rustwater: 0.3 })[mapId] || 0.4; }
  function rollMerchantStock(mapId) {
    const bias = merchantBias(mapId), types = Object.keys(GEAR_SLOTS).filter(s => s !== 'plate'), out = [];
    for (let i = 0; i < MERCHANT_STOCK; i++) {
      const g = Math.random() < 0.34 ? rollTech(bias) : makeGear(types[Phaser.Math.Between(0, types.length - 1)], rollRarity(bias));   // ~1/3 Tech-Module
      out.push({ gear: g, price: Math.round(gearValue(g) * MERCHANT_BUY_MULT) });
    }
    return out;
  }
  function merchantStock() {
    if (!state.merchant[state.map]) { state.merchant[state.map] = rollMerchantStock(state.map); save(); }
    return state.merchant[state.map];
  }
  function buyMerchantGear(idx) {
    const stock = state.merchant[state.map]; if (!stock) return;
    const offer = stock[idx]; if (!offer) return;
    if (state.gold < offer.price) { toast('Nicht genug Gold'); return; }
    state.gold -= offer.price; state.gearBag.push(offer.gear); stock.splice(idx, 1);
    updateGold(); toast('🛒 gekauft: ' + RARITY[offer.gear.rarity].name + ' ' + offer.gear.name);
    save(); refreshStore();
  }

  // ---- Gegner / Boss -----------------------------------------
  function addEnemy(x, y, o) {
    const body = sceneRef.add.circle(0, 0, o.r, o.color).setStrokeStyle(3, o.stroke);
    const hpBg = sceneRef.add.rectangle(-o.barW / 2, -o.r - 9, o.barW, 5, 0x000000, 0.6).setOrigin(0, 0.5);
    const hpFill = sceneRef.add.rectangle(-o.barW / 2, -o.r - 9, o.barW, 5, COL_HP).setOrigin(0, 0.5);
    const c = sceneRef.add.container(x, y, [body, hpBg, hpFill]).setDepth(o.isBoss ? 5 : 4);
    const e = { c, body, baseColor: o.color, hp: o.hp, maxHp: o.hp, hpFill, barW: o.barW, r: o.r, contact: o.contact, speed: o.speed, isBoss: !!o.isBoss, elite: !!o.elite, isSuperBoss: !!o.isSuperBoss, name: o.name || '', gold: o.gold || 1, aggro: !!o.aggro,
      cls: o.cls || 'BIOLOGICAL', sub: o.sub || 'outlaw', armor: o.armor || 0, maxArmor: o.armor || 0, frontImmune: !!o.frontImmune, stunUntil: 0, dot: null,
      ranged: o.ranged || null, fireCd: Phaser.Math.Between(300, 1200) };
    enemies.push(e); return e;
  }
  function spawnEnemy() {
    if (!sceneRef || !player || !MAPS[state.map].enemies || enemies.length >= ENEMY_MAX || state.transitioning) return;
    const ang = Math.random() * Math.PI * 2, dist = 360 + Math.random() * 160;
    const ex = Phaser.Math.Clamp(player.x + Math.cos(ang) * dist, state.bounds.minX, state.bounds.maxX);
    const ey = Phaser.Math.Clamp(player.y + Math.sin(ang) * dist, state.bounds.minY, state.bounds.maxY);
    spawnTyped(pickEnemyType(), ex, ey);
  }
  // Elite-Boss: steht als starker Gegner mitten in der Karte (kein Kill-Zähler mehr).
  function spawnElite(ex, ey) {
    let e;
    if (state.isRevealed && Math.random() < 0.5) {   // Mechanischer Goliath: Front-Panzerung
      e = spawnTyped('goliath', ex, ey, { name: 'Goliath-Ernter' });
    } else {                                          // Biologischer Elite (Grenzland-Legende)
      const name = BOSS_NAMES[Phaser.Math.Between(0, BOSS_NAMES.length - 1)];
      e = addEnemy(ex, ey, { r: BOSS_R, barW: 56, hp: BOSS_HP, color: 0xb91c1c, stroke: 0x450a0a, contact: BOSS_CONTACT, speed: BOSS_SPEED, isBoss: true, name, gold: BOSS_GOLD, cls: 'BIOLOGICAL', sub: 'outlaw' });
    }
    e.elite = true;
    // ein paar normale Gegner als Gefolge rundherum
    for (let i = 0; i < 3; i++) { const a = Math.random() * Math.PI * 2, d = 60 + Math.random() * 50; spawnTyped(pickEnemyType(), ex + Math.cos(a) * d, ey + Math.sin(a) * d); }
    return e;
  }
  // Dungeon-Superboss: wartet in der tiefsten Ebene; skaliert mit der Tiefe (Ebene 3 → 6×).
  function spawnSuperBoss(tx, ty, depth) {

  function calcDamage(type, e, base, pen) {
    let dmg = base, effect = null, immune = false;
    const cls = e.cls, armor = Math.max(0, (e.armor || 0) - (pen || 0));   // Panzerbrecher-Perk ignoriert Rüstung
    if (cls === 'MECHANICAL') {
      if (type === 'GALVANIC') { dmg *= 2.5; if (Math.random() < 0.40) effect = 'STUN'; }              // Automaten: massiver Bonus + Kurzschluss
      else if (type === 'KINETIC') { dmg = e.frontImmune ? (armor > 0 ? 0 : dmg) : Math.max(1, dmg - armor); }  // Panzerung schluckt Blei
      else if (type === 'THERMAL') { dmg *= (e.sub === 'goliath') ? 0.6 : 1.2; }                       // Leichtbau brennt, Goliath widersteht
    } else if (cls === 'BIOLOGICAL') {
      if (type === 'KINETIC') { dmg *= 1.5; if (Math.random() < 0.33) effect = 'BLEED'; }              // Fleisch: Bonus + Verbluten
      else if (type === 'GALVANIC') { dmg *= 0.4; }                                                     // biologische Isolierung dämpft
      else if (type === 'THERMAL') { dmg *= 1.3; if (Math.random() < 0.5) effect = 'BURN'; }           // brennt + Überhitzung
    }
    if (type === 'ALCHEMICAL' && armor > 0) { effect = 'CORRODE'; }   // zersetzt Rüstung (in applyStatus)
    if (dmg <= 0) immune = true;
    return { dmg: Math.max(0, Math.round(dmg)), effect, immune };

      if (Phaser.Math.Distance.Between(w.x, w.y, player.x, player.y) > 520) break;
    }
    const e = addEnemy(w.x, w.y, { r: BOSS_R + 6, barW: 66, hp: Math.round(BOSS_HP * 1.8), color: 0xca8a04, stroke: 0x4a2f04, contact: Math.round(BOSS_CONTACT * 1.2), speed: BOSS_SPEED + 4, isBoss: true, name: state.bounty.name, gold: BOSS_GOLD * 2, cls: 'BIOLOGICAL', sub: 'outlaw' });
    e.elite = true; e.bountyTarget = true; e.bountyId = state.bounty.id;
    e.marker = sceneRef.add.text(e.c.x, e.c.y - e.r - 18, '🎯', { fontSize: '18px' }).setOrigin(0.5).setDepth(8);
    for (let i = 0; i < 3; i++) { const a = Math.random() * Math.PI * 2, d = 60 + Math.random() * 50; spawnTyped(pickEnemyType(), e.c.x + Math.cos(a) * d, e.c.y + Math.sin(a) * d, { aggro: true }); }
  }
  // --- Destille: Vorrat (Tränke, günstiger je Stufe) ---
  function distilleryPotionPrice() { return Math.max(12, POTION_PRICE - state.economy.distillery.level * 4); }
  function distillerySupply() {
    const price = distilleryPotionPrice();
    if (state.gold < price) { toast('Nicht genug Gold'); return; }
    state.gold -= price; state.potions++; updateGold(); updateAbilityUI();
    toast('🍶 Trank gekauft (' + price + ' 💰)'); save(); refreshTycoon();
  }
  function tycoonPrimary(id) {
    if (id === 'saloon') saloonBounty();
    else if (id === 'forge') { closeTycoon(); openStore(); }       // Handelsposten → Händler
    else if (id === 'distillery') distillerySupply();
  }
  function refreshTycoon() { closeTycoon(); openTycoon(); }
  function closeTycoon() { state.tycoonOpen = false; tyUI.forEach(o => o.destroy()); tyUI = []; tyButtons = []; tyCloseRef = null; tyPanelRef = null; }
  function buyBuilding(k) {
    const b = BUILDINGS[k], lvl = state.economy[k].level;
    if (lvl >= b.max) { toast('Bereits max'); return; }
    const cost = b.baseCost * (lvl + 1);
    if (state.gold < cost) { toast('Nicht genug Gold (' + state.gold + '/' + cost + ')'); return; }
    state.gold -= cost; state.economy[k].level++; updateGold();
    if (shopLabels[k]) shopLabels[k].setText(b.icon + ' Stufe ' + state.economy[k].level);
    toast(b.name + ' → Stufe ' + state.economy[k].level + '  (+' + b.incomePer + '/Sek)'); save();
    closeTycoon(); openTycoon();
  }
  function toast(msg) { const t = sceneRef.add.text(sceneRef.scale.width / 2, sceneRef.scale.height * 0.3, msg, { fontFamily: 'system-ui', fontSize: '22px', color: '#f3e9d2', stroke: '#000', strokeThickness: 4, fontStyle: 'bold' }).setOrigin(0.5).setScrollFactor(0).setDepth(60); sceneRef.tweens.add({ targets: t, alpha: 0, y: '-=18', delay: 900, duration: 700, onComplete: () => t.destroy() }); }
  // ---- Sound-Effekte (WebAudio, synthetisiert — keine externen Dateien) ----
  let audioCtx = null, lastSfx = {};
  function initAudio() { if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { audioCtx = null; } } if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); }
  const SFX = {
    shoot: { f: 300, f2: 170, d: 0.05, type: 'square', v: 0.035, gap: 55 },
    kill:  { f: 190, f2: 80, d: 0.16, type: 'sawtooth', v: 0.08 },
    coin:  { f: 950, f2: 1350, d: 0.07, type: 'sine', v: 0.04, gap: 40 },
    level: { seq: [523, 659, 784, 1047], d: 0.11, type: 'sine', v: 0.09 },
    perk:  { f: 680, f2: 1040, d: 0.12, type: 'triangle', v: 0.08 },
    slam:  { f: 95, f2: 38, d: 0.28, type: 'sawtooth', v: 0.12 },
    hurt:  { f: 170, f2: 70, d: 0.13, type: 'square', v: 0.09, gap: 180 }
  };
  function sfx(name) {
    if (state.muted) return; const s = SFX[name]; if (!s) return; initAudio(); if (!audioCtx) return;
    const now = audioCtx.currentTime * 1000; if (s.gap && now - (lastSfx[name] || 0) < s.gap) return; lastSfx[name] = now;
    const t0 = audioCtx.currentTime;
    const play = (freq, at, dur) => {
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = s.type; o.frequency.setValueAtTime(freq, at);
      if (s.f2 && !s.seq) o.frequency.exponentialRampToValueAtTime(Math.max(20, s.f2), at + dur);
      g.gain.setValueAtTime(s.v, at); g.gain.exponentialRampToValueAtTime(0.0001, at + dur);
      o.connect(g).connect(audioCtx.destination); o.start(at); o.stop(at + dur + 0.02);
    };
    if (s.seq) s.seq.forEach((f, i) => play(f, t0 + i * s.d, s.d)); else play(s.f, t0, s.d);
  }

  // ---- Joystick ----------------------------------------------
  function updateStick(px, py) {
    let dx = px - stick.baseX, dy = py - stick.baseY; const len = Math.hypot(dx, dy);
    if (len > STICK_RADIUS) { dx = dx / len * STICK_RADIUS; dy = dy / len * STICK_RADIUS; }
    stickThumb.setPosition(stick.baseX + dx, stick.baseY + dy); stick.vx = dx / STICK_RADIUS; stick.vy = dy / STICK_RADIUS;
  }
  function resetStick() { stick.active = false; stick.id = null; stick.vx = 0; stick.vy = 0; stickBase.setVisible(false); stickThumb.setVisible(false); }

  // ---- Update ------------------------------------------------
  function update(time, delta) {
    if (!player) return;
    const dt = delta / 1000, now = sceneRef.time.now;
    const uiBlocked = state.fullMapOpen || state.travelOpen || state.inventoryOpen || state.storeOpen || state.workshopOpen || state.tycoonOpen || state.stashOpen || state.chestOpen || state.dialogueOpen || state.revealPlaying;

    // Bewegung
    let vx = 0, vy = 0;
    if (!uiBlocked && stick.active) { vx = stick.vx; vy = stick.vy; }
    if (!uiBlocked) {
      if (cursors.left.isDown || wasd.left.isDown) vx = -1;
      if (cursors.right.isDown || wasd.right.isDown) vx = 1;
      if (cursors.up.isDown || wasd.up.isDown) vy = -1;
      if (cursors.down.isDown || wasd.down.isDown) vy = 1;
    }
    let mag = Math.hypot(vx, vy);
    if (mag >= STICK_DEADZONE) {
      if (mag > 1) { vx /= mag; vy /= mag; }
      player.x = Phaser.Math.Clamp(player.x + vx * moveSpeed() * dt, state.bounds.minX, state.bounds.maxX);
      player.y = Phaser.Math.Clamp(player.y + vy * moveSpeed() * dt, state.bounds.minY, state.bounds.maxY);
      player.facing = Math.atan2(vy, vx); player.rotation = player.facing;
    }
    if (colliders.length) resolveCollision();   // solide Wände/Gebäude
    if (!uiBlocked) updateBarks(now);            // Atmosphäre-Barks (Story-Bibel Teil C)
    shadow.setPosition(player.x, player.y + 14);
    player.setAlpha(now < state.invulnUntil && Math.floor(now / 120) % 2 === 0 ? 0.45 : 1);

    const pt = worldToTile(player.x, player.y);
    if (pt.c !== state.playerTile.c || pt.r !== state.playerTile.r) { state.playerTile = pt; reveal(pt.c, pt.r); miniDirty = true; }
    streamChunks(1);   // jeden Frame hoechstens 1 Chunk nachbacken -> ruckelfrei

    // Beim Angreifen automatisch zum nächsten Gegner ausrichten (kein Zielen per Bewegung nötig)
    if (!uiBlocked && shooting) { const t = nearestEnemy(AIM_RANGE); if (t) { const a = Math.atan2(t.c.y - player.y, t.c.x - player.x); player.facing = a; player.rotation = a; } }
    fireTimer -= delta;
    if (!uiBlocked && shooting && fireTimer <= 0) { fireBullet(); fireTimer = fireMs(); }

    // Cooldowns
    state.cd.spread = Math.max(0, state.cd.spread - delta);
    state.cd.dash = Math.max(0, state.cd.dash - delta);
    state.cd.acid = Math.max(0, state.cd.acid - delta);
    state.cd.shock = Math.max(0, state.cd.shock - delta);
    updateAbilityUI();

    // Gegner: idle bis nah -> dann verfolgen + Kontaktschaden
    let touched = false;
    for (const e of enemies) {
      if (e.marker) e.marker.setPosition(e.c.x, e.c.y - e.r - 18);
      const ex = player.x - e.c.x, ey = player.y - e.c.y, d = Math.hypot(ex, ey) || 1;
      const stunned = now < e.stunUntil;
      if (e.body) e.body.setFillStyle(stunned ? 0x7dd3fc : e.baseColor);   // Kurzschluss sichtbar machen
      if (stunned) continue;                                               // bewegungsunfähig, kein Kontaktschaden
      if (!e.aggro) { if (d < AGGRO_RANGE) { e.aggro = true; if (!e.isBoss && Math.random() < 0.2) sayBark(e.c.x, e.c.y - e.r - 22, pickBark(e.cls === 'MECHANICAL' ? BARKS.enemy_mech : BARKS.enemy_bio), e.cls === 'MECHANICAL' ? '#93c5fd' : '#fca5a5'); } else continue; }   // erst angreifen, wenn nah genug
      else if (!e.isBoss && d > LEASH_RANGE) { e.aggro = false; continue; }   // zu weit -> beruhigt sich wieder
      if (e.ranged) {   // Fernkämpfer: Abstand halten (Deckung/Schützenlinie), kiten & feuern
        const R = e.ranged;
        if (d > R.max) { e.c.x += (ex / d) * e.speed * dt; e.c.y += (ey / d) * e.speed * dt; }        // heranrücken
        else if (d < R.min) { e.c.x -= (ex / d) * e.speed * 0.8 * dt; e.c.y -= (ey / d) * e.speed * 0.8 * dt; }   // zurückweichen
        e.fireCd -= delta;
        if (d <= R.max + 20 && e.fireCd <= 0 && !uiBlocked && !state.transitioning) { enemyFire(e, R); e.fireCd = R.rate; }
        continue;
      }
      if (d > PLAYER_R + e.r) { e.c.x += (ex / d) * e.speed * dt; e.c.y += (ey / d) * e.speed * dt; }
      else if (!uiBlocked && now > state.invulnUntil) { state.hp -= e.contact * dt * dmgTakenMul(); state.lastDamage = now; touched = true; }
    }
    if (touched) { updateLife(); sfx('hurt'); sceneRef.cameras.main.shake(90, 0.005); if (state.hp <= 0) respawnPlayer(); }
    else if (now - state.lastDamage > REGEN_DELAY && state.hp < state.maxHp) { state.hp = Math.min(state.maxHp, state.hp + regenRate() * dt); updateLife(); }
    if (!uiBlocked && !state.transitioning) for (const e of enemies) if (e.isBoss) bossAI(e, now);   // Boss-Muster (Telegraph-Angriffe)
    if (state.boss) updateBossBar();

    // Status-Effekte über Zeit (Verbluten / Überhitzung) — Rückwärts-Index, da Gegner sterben können
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i]; if (!e.dot) continue;
      if (now >= e.dot.until) { e.dot = null; continue; }
      e.dot.tick += dt;
      if (e.dot.tick >= 0.4) { const dd = Math.round(e.dot.dps * e.dot.tick); e.dot.tick = 0; if (dd > 0) damageEnemy(e, dd, { color: e.dot.color }); }
    }

    // Projektile
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i]; b.sprite.x += b.vx * dt; b.sprite.y += b.vy * dt; b.life -= dt;
      let hitE = false;
      for (const e of enemies) if (!(b.hitSet && b.hitSet.has(e)) && Phaser.Math.Distance.Between(b.sprite.x, b.sprite.y, e.c.x, e.c.y) < e.r + BULLET_R) {
        const res = calcDamage(b.type, e, b.base, armorPen());
        let dmg = res.dmg, crit = false;
        if (dmg > 0 && Math.random() < critChance()) { dmg = Math.round(dmg * critMult()); crit = true; }   // Krit-Perk (+ Panzerbrecher-Synergie)
        if (res.effect) applyStatus(e, res.effect, b.acid);
        if (crit && b.type === 'KINETIC' && hasPower('galvcrit')) applyStatus(e, 'STUN');   // Galvanische Trommel
        damageEnemy(e, dmg, { color: crit ? 0xfde047 : DMG_TYPES[b.type].color, immune: res.immune });
        if (crit && (hasPower('critchain') || hasCap('gun'))) {                              // Rechenkern (Legendär/Kapstein): Krit prallt ab
          let best = null, bd = 220; for (const o of enemies) { if (o === e || o.hp <= 0) continue; const d2 = Phaser.Math.Distance.Between(e.c.x, e.c.y, o.c.x, o.c.y); if (d2 < bd) { bd = d2; best = o; } }
          if (best) { popLoot(best.c.x, best.c.y - best.r, '⚡'); damageEnemy(best, Math.round(dmg * 0.6), { color: 0xfde047 }); }
        }
        if (b.pierce > 0) { b.pierce--; (b.hitSet || (b.hitSet = new Set())).add(e); } else { hitE = true; }   // Durchschlag: nicht sofort verschwinden
        break;
      }
      if (hitE || b.life <= 0) { b.sprite.destroy(); bullets.splice(i, 1); }
    }

    // Feindliche Projektile (Fernkämpfer)
    for (let i = eBullets.length - 1; i >= 0; i--) {
      const b = eBullets[i]; b.sprite.x += b.vx * dt; b.sprite.y += b.vy * dt; b.life -= dt;
      let hit = false;
      if (Phaser.Math.Distance.Between(b.sprite.x, b.sprite.y, player.x, player.y) < PLAYER_R + E_BULLET_R) {
        if (!uiBlocked && now > state.invulnUntil) { state.hp -= b.dmg * dmgTakenMul(); state.lastDamage = now; updateLife(); if (state.hp <= 0) respawnPlayer(); }
        hit = true;
      }
      if (hit || b.life <= 0) { b.sprite.destroy(); eBullets.splice(i, 1); }
    }

    // Gold-Münzen
    for (let i = coins.length - 1; i >= 0; i--) {
      const co = coins[i], dx = player.x - co.s.x, dy = player.y - co.s.y, d = Math.hypot(dx, dy) || 1;
      if (d < PICKUP_DIST) {
        if (co.gear) {
          if (gearCells(co.gear) <= gridFree()) {
            state.gearBag.push(co.gear); popLoot(co.s.x, co.s.y, co.gear.icon); toast(RARITY[co.gear.rarity].name + ': ' + co.gear.name); save();
            co.s.destroy(); coins.splice(i, 1); continue;
          } else if (now > state.invFullAt) { toast('🎒 Inventar voll — Platz schaffen (ausrüsten/verschrotten)'); state.invFullAt = now + 4000; }
        } else if (co.item) {
          if (!canTakeMat(co.item)) {   // nur ein NEUER Materialtyp braucht einen Slot; Stapel wächst unbegrenzt
            if (now > state.invFullAt) { toast('🎒 Inventar voll — kein Slot frei (Truhe leeren)'); state.invFullAt = now + 4000; }
          } else {
            state.inventory[co.item] = (state.inventory[co.item] || 0) + 1; popLoot(co.s.x, co.s.y, ITEMS[co.item].icon);
            co.s.destroy(); coins.splice(i, 1); continue;
          }
        } else if (co.ammo) {
          const a = AMMO[co.ammo]; addAmmo(co.ammo, co.n || 1); updateWeaponUI();
          popLoot(co.s.x, co.s.y, a.icon); co.s.destroy(); coins.splice(i, 1); continue;
        } else { state.gold += 1; updateGold(); popGold(co.s.x, co.s.y); sfx('coin'); co.s.destroy(); coins.splice(i, 1); continue; }
      }
      const blocked = (co.item && !canTakeMat(co.item)) || (co.gear && gearCells(co.gear) > gridFree());
      if (d < magnetDist() && !blocked) { co.s.x += (dx / d) * MAGNET_SPEED * dt; co.s.y += (dy / d) * MAGNET_SPEED * dt; }
    }

    if (!uiBlocked && !state.transitioning) updateContext();
    if (miniDirty) { refreshMaps(); miniDirty = false; }
    updateQuestTracker(); updateTutorial();
  }

  function updateContext() {
    const m = MAPS[state.map];
    // Tore: einfach reinlaufen -> automatischer Übergang
    for (const p of m.portals) {
      const w = tileToWorld(p.tx, p.ty);
      if (Phaser.Math.Distance.Between(player.x, player.y, w.x, w.y) < GATE_ENTER_DIST && sceneRef.time.now > state.portalGraceUntil) { transitionTo(p.to, p.spawn); return; }
    }
    let best = null, bestType = null, bestD = 1e9;
    for (const s of m.stations) {
      const w = tileToWorld(s.tx, s.ty), d = Phaser.Math.Distance.Between(player.x, player.y, w.x, w.y);
      if (d < DISCOVER_DIST && !state.discovered.has(s.id)) { state.discovered.add(s.id); miniDirty = true; toast('🚂 Bahnhof entdeckt: ' + s.name); }
      if (d < INTERACT_DIST && d < bestD) { best = s; bestType = 'station'; bestD = d; }
    }
    for (const sh of (m.shops || [])) { const w = tileToWorld(sh.tx, sh.ty), d = Phaser.Math.Distance.Between(player.x, player.y, w.x, w.y); if (d < INTERACT_DIST + 40 && d < bestD) { best = sh; bestType = 'shop'; bestD = d; } }
    for (const ch of chests) { const d = Phaser.Math.Distance.Between(player.x, player.y, ch.c.x, ch.c.y); if (d < CHEST_INTERACT && d < bestD) { best = ch; bestType = 'chest'; bestD = d; } }
    if (best) {
      state.ctx = { type: bestType, target: best };
      if (bestType === 'station') showContext(Object.keys(STATION_INDEX).filter(id => state.discovered.has(id)).length >= 2 ? '🚂  Zugreise' : '🚂  ' + best.name);
      else if (bestType === 'chest') showContext('📦  Kiste öffnen');
      else if (best.id === 'store') showContext('🛒  Store — kaufen & verkaufen');
      else if (best.id === 'stash') showContext('📦  Truhe — Loot einlagern (' + gridUsedCells() + '/' + invLayout().cap + ' Plätze)');
      else if (best.id === 'werkstatt') showContext(state.isRevealed ? '🔧  Werkstatt — Modifikationen' : '🔧  Werkstatt — Waffen-Tuning');
      else if (BUILDINGS[best.id]) { const b = BUILDINGS[best.id], lvl = state.economy[best.id].level; showContext(b.icon + '  ' + b.name + (lvl > 0 ? ' — Stufe ' + lvl : ' — kaufen')); }
    } else { state.ctx = null; hideContext(); }
  }

  // ---- Start -------------------------------------------------
  new Phaser.Game({
    type: Phaser.AUTO, parent: 'game', backgroundColor: '#2b2620',
    scale: { mode: Phaser.Scale.RESIZE, width: window.innerWidth, height: window.innerHeight },
    render: { antialias: true, roundPixels: true },
    scene: { create, update }
  });
  </script>
</body>
